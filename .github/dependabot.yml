version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 2
    groups:
      npm-maintenance:
        patterns:
          - "*"
    labels:
      - dependencies
      - automated-maintenance
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      action-maintenance:
        patterns:
          - "*"
    labels:
      - dependencies
      - automated-maintenance
