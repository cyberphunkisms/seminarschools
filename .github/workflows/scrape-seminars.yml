name: Scrape seminars

# Weekly Toronto-GTA event harvest via Claude headless mode (claude -p).
#
# Architecture, May 26 2026 (post-audit):
# Old design used Python with requests + BeautifulSoup against 23 configured
# sources. Result: 1 working fetcher, 2 WAF-blocked, 19 stubs returning empty.
# Total feed: 8 hand-typed events. April 15 2026 Claude-research baseline: 70+.
#
# New design: Claude headless CLI reads scripts/seminars-prompt.md (which
# embeds the venue roster and schema), uses WebFetch to crawl, emits a JSON
# array conforming to /data/seminars-schema.json, post-processor merges with
# /data/manual-events.json, validates, commits if changed.
#
# Auth: CLAUDE_CODE_OAUTH_TOKEN generated locally via `claude setup-token`.
# This binds the headless runner to the Max 20x subscription. Post June 15
# 2026 it draws from the $200/mo Agent SDK credit pool. Using an API key
# (ANTHROPIC_API_KEY) instead would route through pay-as-you-go billing,
# not the subscription credit pool.
#
# Per-run cost estimate: $1-3 of Sonnet 4.6 tokens. Hard cap: $5 via
# --max-budget-usd. Weekly cadence = $4-12/month. Well inside $200 ceiling.
#
# Schedule: weekly Monday 06:00 UTC = 02:00 Toronto (EDT). Pre-dawn lets the
# commit-and-deploy cycle finish before Toronto wakes. Manual dispatch also
# enabled for testing.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Claude Code (native binary)
        # The native installer is the recommended method per
        # https://code.claude.com/docs. NPM install is deprecated.
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Claude Code install
        run: claude --version

      - name: Install Python validator dependencies
        run: pip install jsonschema

      - name: Run Claude headless scrape
        env:
          # OAuth token from `claude setup-token`. Authenticates against the
          # Max 20x subscription credit pool. NOT an API key.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: bash scripts/seminars-prompt-runner.sh

      - name: Validate output against schema
        run: python3 scripts/validate_seminars.py

      - name: Commit and push if changed
        run: |
          set -x
          git config user.name "seminars-bot"
          git config user.email "saul+seminarsbot@seminarschools.com"
          echo "--- Pre-commit status ---"
          git status
          git add -A seminars/ data/
          echo "--- Staged for commit ---"
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No changes to commit. Scrape produced identical output."
            exit 0
          fi
          git commit -m "Update seminars calendar ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git pull --rebase origin main
          git push origin main
          echo "Push succeeded."
