name: Refresh polymythcalendar festivals

on:
  workflow_dispatch:
  schedule:
    - cron: '45 11 * * *'

permissions:
  contents: write

concurrency:
  group: polymythcalendar-harvest
  cancel-in-progress: false

jobs:
  festivals:
    runs-on: ubuntu-latest
    timeout-minutes: 32
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MAX_TURNS: '55'
      MAX_BUDGET_USD: '3.50'
      HARVEST_TIMEOUT_SECONDS: '1500'
      HARVEST_LOG_DIR: data/harvest-runs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validators
        run: pip install jsonschema
      - name: Install site dependencies
        run: npm ci
      - name: Harvest festivals
        run: bash scripts/festivals-prompt-runner.sh
      - name: Verify generated calendar
        run: npm run verify:all
      - name: Commit verified changes
        run: |
          git config user.name "seminarschools calendar bot"
          git config user.email "calendar-bot@users.noreply.github.com"
          git add data seminars festivals polymythseminars sitemap.xml scripts/search-surface-manifest.json main/index.html
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh polymythcalendar festivals"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
      - name: Preserve harvest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polymythcalendar-festivals-${{ github.run_id }}
          path: data/harvest-runs/
          if-no-files-found: warn
          retention-days: 30
