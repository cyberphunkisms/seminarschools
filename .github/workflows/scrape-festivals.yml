name: Scrape festivals
on:
  workflow_dispatch:
    inputs:
      strict_harvest:
        description: strict_harvest
        required: false
        default: "false"
  schedule:
    - cron: "42 9 * * 2,5"
concurrency:
  group: polymythcal-publish-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      STRICT_HARVEST_FAILURES: ${{ github.event.inputs.strict_harvest || 'false' }}
      HARVEST_ATTEMPTS: "2"
      HARVEST_STRICT: ${{ github.event.inputs.strict_harvest || 'false' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install calendar dependencies
        run: python3 -m pip install --disable-pip-version-check beautifulsoup4 requests python-dateutil jsonschema
      - name: Test Polymythcal adapters and lifecycle
        run: |
          python3 -m unittest scripts/test_polymythcal_adapters.py
          python3 -m unittest scripts/test_polymythcal_lifecycle.py
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.14
      - name: Claude version
        run: claude --version
      - name: Run festival harvest
        run: bash scripts/festivals-prompt-runner.sh
      - name: Summarize harvest outcome
        if: always()
        run: node scripts/summarize-harvest-status.js >> "$GITHUB_STEP_SUMMARY"
      - name: Verify generated calendar
        run: |
          python3 scripts/validate-polymythcal.py
          npm run verify:calendar-data
          npm run verify:polymythcal-audit14
      - name: Create publication pull request
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/polymythcal-${{ github.workflow }}
          delete-branch: true
          commit-message: "Update Polymythcal verified data"
          title: "Polymythcal verified harvest update"
          body: "Automated harvest passed canonical semantic validation. Review the event diff, qualifications, lifecycle changes, and source diagnostics before merging."
          labels: polymythcal,automated-harvest
      - name: Preserve harvest diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: festival-harvest-diagnostics
          path: |
            data/harvest-runs/**
            data/polymythcal-lifecycle-log.json
            data/polymythcal-lifecycle-state.json
      - name: Summarize harvest diagnostics
        if: always()
        run: bash scripts/summarize-harvest-diagnostics.sh
