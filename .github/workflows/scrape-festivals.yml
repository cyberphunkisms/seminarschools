name: Refresh polymythcalendar festivals

on:
  workflow_dispatch:
    inputs:
      strict_harvest:
        description: 'Fail this run if the external Claude harvest fails'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '45 11 * * *'

permissions:
  contents: write

concurrency:
  group: polymythcalendar-harvest
  cancel-in-progress: false

jobs:
  festivals:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MAX_TURNS: '40'
      MAX_BUDGET_USD: '3.00'
      HARVEST_TIMEOUT_SECONDS: '840'
      HARVEST_ATTEMPTS: '1'
      FESTIVAL_SHARD_COUNT: '10'
      STRICT_HARVEST_FAILURES: ${{ github.event_name == 'workflow_dispatch' && inputs.strict_harvest && 'true' || 'false' }}
      HARVEST_LOG_DIR: data/harvest-runs
      HARVEST_STRICT: ${{ github.event_name == 'workflow_dispatch' && inputs.strict_harvest && '1' || '0' }}
      CLAUDE_MODEL: claude-sonnet-4-6
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Initialize harvest diagnostics
        run: node scripts/initialize-harvest-status.js festivals
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install validators
        timeout-minutes: 3
        run: pip install jsonschema
      - name: Install site dependencies
        timeout-minutes: 5
        run: npm ci
      - name: Install Claude Code CLI
        timeout-minutes: 7
        continue-on-error: true
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version
      - name: Harvest festivals
        timeout-minutes: 20
        run: bash scripts/festivals-prompt-runner.sh
      - name: Summarize harvest diagnostics
        if: always()
        run: bash scripts/summarize-harvest-diagnostics.sh festivals
      - name: Summarize harvest outcome
        if: always()
        run: node scripts/summarize-harvest-status.js festivals
      - name: Verify generated calendar
        run: npm run verify:all
      - name: Commit verified changes
        run: |
          git config user.name "seminarschools calendar bot"
          git config user.email "calendar-bot@users.noreply.github.com"
          git add data seminars festivals polymythseminars writingclub writingkids writingjuniors writingteens writinggrads university philosophy humanities cfps lectures fellowships sitemap.xml scripts/search-surface-manifest.json main/index.html
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh polymythcalendar festivals"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
      - name: Preserve harvest diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: polymythcalendar-festivals-${{ github.run_id }}
          path: data/harvest-runs/
          if-no-files-found: warn
          retention-days: 30
