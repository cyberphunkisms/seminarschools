name: Scrape festivals
on:
  workflow_dispatch:
    inputs:
      strict_harvest:
        description: strict_harvest
        required: false
        default: "false"
  schedule:
    - cron: "42 9 * * 2,5"
concurrency:
  group: scrape-festivals-${{ github.ref }}
  cancel-in-progress: false
jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      STRICT_HARVEST_FAILURES: ${{ github.event.inputs.strict_harvest || 'false' }}
      HARVEST_ATTEMPTS: "2"
      HARVEST_STRICT: ${{ github.event.inputs.strict_harvest || 'false' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Claude version
        run: claude --version
      - name: Run festival harvest
        run: bash scripts/festivals-prompt-runner.sh
      - name: Summarize harvest outcome
        if: always()
        run: node scripts/summarize-harvest-status.js >> "$GITHUB_STEP_SUMMARY"
      - name: Verify generated calendar
        run: npm run verify:calendar-data
      - name: Preserve harvest diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: festival-harvest-diagnostics
          path: data/harvest-runs/**
      - name: Summarize harvest diagnostics
        if: always()
        run: bash scripts/summarize-harvest-diagnostics.sh
