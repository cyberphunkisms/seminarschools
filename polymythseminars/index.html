<style>
  :root {
    /* surfaces + ink aliased to the shared theme (css/theme.css) so they switch day/night */
    --paper: var(--bg-soft, #FBF6F1);
    --ink: var(--fg, #2B2520);
    --dim: var(--muted, #6B5F55);
    --hairline: var(--rule, #D9CFC6);
    --accent-light: #A07A2C;
    --accent-dark: #D8B45C;
    --accent: var(--accent-light);
    /* category colors — light */
    --cat-lecture: #4A3F8A; --cat-conference: #1A5276; --cat-workshop: #1A6E4E;
    --cat-reading: #7B2D4E; --cat-festival: #B85420; --cat-exhibition: #5A4A2E;
    --cat-performance: #8B6914; --cat-defence: #2E5230; --cat-gathering: #5A5A52;
    --cat-protest: #A93226; --cat-community: #157A72; --cat-other: #6B5F55;
    --cat-screening: #1F7A8C; --cat-cfp: #5D5F8A; --cat-contest: #B0327A;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --display: 'Libre Baskerville', Georgia, serif;
    --sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  }
  /* category colors + accent lifted for dark; mirrors css/theme.css triggers */
  @media (prefers-color-scheme: dark) {
    :root:not(.light) {
      --accent: var(--accent-dark);
      --cat-lecture: #9C8FE6; --cat-conference: #6FB1DA; --cat-workshop: #5FC79A;
      --cat-reading: #DE8FB0; --cat-festival: #E8975C; --cat-exhibition: #CDB48C;
      --cat-performance: #D8B65A; --cat-defence: #84C088; --cat-gathering: #B8B4A8;
      --cat-protest: #E58375; --cat-community: #5FC4B8; --cat-other: #BDA899;
    --cat-screening: #62C0D2; --cat-cfp: #A3A6D6; --cat-contest: #E883C0;
      --cat-screening: #62C0D2; --cat-cfp: #A3A6D6; --cat-contest: #E883C0;
    }
  }
  :root.dark, :root[data-theme="dark"] {
    --accent: var(--accent-dark);
    --cat-lecture: #9C8FE6; --cat-conference: #6FB1DA; --cat-workshop: #5FC79A;
    --cat-reading: #DE8FB0; --cat-festival: #E8975C; --cat-exhibition: #CDB48C;
    --cat-performance: #D8B65A; --cat-defence: #84C088; --cat-gathering: #B8B4A8;
    --cat-protest: #E58375; --cat-community: #5FC4B8; --cat-other: #BDA899;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--ink); margin: 0; padding: 0; font-family: var(--serif); font-size: 18px; line-height: 1.55; }
  body { padding: 2.2rem 1.4rem 6rem; }
  main { max-width: 880px; margin: 0 auto; }
  body.cal-mode main { max-width: 1180px; }

  /* ---------- Header ---------- */
  header.cv-header { text-align: center; margin-bottom: 1.5rem; }
  header.cv-header h1 {
    font-family: var(--display); font-weight: 700; font-size: 2.2rem;
    margin: 0; letter-spacing: 0.01em; line-height: 1.15;
  }
  header.cv-header .meta {
    font-family: var(--sans); font-size: 0.85rem; color: var(--dim);
    margin-top: 0.45rem; letter-spacing: 0.04em; text-transform: uppercase;
  }
  header.cv-header .meta a { color: inherit; border-bottom: 1px dotted currentColor; text-decoration: none; }
  header.cv-header .tag {
    margin-top: 0.6rem; font-family: var(--serif); font-style: italic; color: var(--dim);
    font-size: 1.05rem;
  }

  /* ---------- Filter Nav (mirrors /saul/ pattern) ---------- */
  .filter-nav {
    display: flex; flex-wrap: wrap; gap: 0.42rem; justify-content: center;
    margin: 1.6rem 0 0.5rem; padding: 0 0.4rem;
  }
  .filter-nav button {
    font-family: var(--sans); font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0.4rem 0.85rem; border: 1px solid var(--hairline); background: transparent;
    color: var(--dim); border-radius: 999px; cursor: pointer; transition: all 0.15s;
  }
  .filter-nav button:hover { color: var(--ink); border-color: var(--ink); }
  .filter-nav button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Category color washes — single click applies category accent */
  .filter-nav button[data-cat="lecture"].on { border-color: var(--cat-lecture); background: color-mix(in srgb, var(--cat-lecture) 14%, transparent); color: var(--cat-lecture); }
  .filter-nav button[data-cat="conference"].on { border-color: var(--cat-conference); background: color-mix(in srgb, var(--cat-conference) 14%, transparent); color: var(--cat-conference); }
  .filter-nav button[data-cat="workshop"].on { border-color: var(--cat-workshop); background: color-mix(in srgb, var(--cat-workshop) 14%, transparent); color: var(--cat-workshop); }
  .filter-nav button[data-cat="reading"].on { border-color: var(--cat-reading); background: color-mix(in srgb, var(--cat-reading) 14%, transparent); color: var(--cat-reading); }
  .filter-nav button[data-cat="festival"].on { border-color: var(--cat-festival); background: color-mix(in srgb, var(--cat-festival) 14%, transparent); color: var(--cat-festival); }
  .filter-nav button[data-cat="exhibition"].on { border-color: var(--cat-exhibition); background: color-mix(in srgb, var(--cat-exhibition) 14%, transparent); color: var(--cat-exhibition); }
  .filter-nav button[data-cat="performance"].on { border-color: var(--cat-performance); background: color-mix(in srgb, var(--cat-performance) 14%, transparent); color: var(--cat-performance); }
  .filter-nav button[data-cat="defence"].on { border-color: var(--cat-defence); background: color-mix(in srgb, var(--cat-defence) 14%, transparent); color: var(--cat-defence); }
  .filter-nav button[data-cat="gathering"].on { border-color: var(--cat-gathering); background: color-mix(in srgb, var(--cat-gathering) 14%, transparent); color: var(--cat-gathering); }
  .filter-nav button[data-cat="protest"].on { border-color: var(--cat-protest); background: color-mix(in srgb, var(--cat-protest) 14%, transparent); color: var(--cat-protest); }
  .filter-nav button[data-cat="community"].on { border-color: var(--cat-community); background: color-mix(in srgb, var(--cat-community) 14%, transparent); color: var(--cat-community); }
  .filter-nav button[data-cat="other"].on { border-color: var(--cat-other); background: color-mix(in srgb, var(--cat-other) 14%, transparent); color: var(--cat-other); }
  .filter-nav button[data-cat="screening"].on { border-color: var(--cat-screening); background: color-mix(in srgb, var(--cat-screening) 14%, transparent); color: var(--cat-screening); }
  .filter-nav button[data-cat="cfp"].on { border-color: var(--cat-cfp); background: color-mix(in srgb, var(--cat-cfp) 14%, transparent); color: var(--cat-cfp); }
  .filter-nav button[data-cat="contest"].on { border-color: var(--cat-contest); background: color-mix(in srgb, var(--cat-contest) 14%, transparent); color: var(--cat-contest); }
  /* age filter row */
  .age-nav { margin-top: 0.35rem; margin-bottom: 1.7rem; row-gap: 0.42rem; }
  .age-nav .age-label { font-family: var(--sans); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); align-self: center; margin-right: 0.3rem; }
  .age-nav button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  /* multiday, multi-tag, festival nesting */
  .event { border-left: 3px solid var(--cat-other); padding-left: 0.9rem; }
  .event .body-col .daterange { font-family: var(--sans); font-size: 0.74rem; font-weight: 600; letter-spacing: 0.04em; color: var(--accent); margin: 0.1rem 0 0.2rem; }
  .event .body-col .venue.age { font-style: normal; opacity: 0.9; }
  .event .body-col .type-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.45rem; }
  .event .body-col .type-tags .type-tag { margin-top: 0; }
  .event.is-parent .body-col .title::after { content: " \00B7 festival"; font-family: var(--sans); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); font-weight: 600; }
  .subevents { margin: 0.5rem 0 0.3rem 1.5rem; padding-left: 1rem; border-left: 1px dashed var(--hairline); }
  .subevents .event { grid-template-columns: 56px 1fr; gap: 0.85rem; padding-top: 0.7rem; padding-bottom: 0.7rem; }
  .subevents .event .date-col .day { font-size: 1.25rem; }
  .subevents .event .body-col .title { font-size: 0.95rem; }
  .sub-toggle { display: inline-block; margin: 0.15rem 0 0.7rem 1.5rem; padding: 0.25rem 0.7rem; font-family: var(--sans); font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); background: transparent; border: 1px solid var(--hairline); border-radius: 999px; cursor: pointer; transition: all 0.15s; }
  .sub-toggle:hover { border-color: var(--accent); }
  .sub-toggle.open { color: var(--paper); background: var(--accent); border-color: var(--accent); }

  /* ---------- View toggle ---------- */
  .view-toggle {
    display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0 1.6rem;
    font-family: var(--sans); font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .view-toggle button {
    padding: 0.42rem 1rem; border: 1px solid var(--hairline); background: transparent;
    color: var(--dim); cursor: pointer; transition: all 0.15s;
    font-family: inherit; font-size: inherit; letter-spacing: inherit; text-transform: inherit;
  }
  .view-toggle button:hover { color: var(--ink); }
  .view-toggle button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .view-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .view-toggle button:last-child { border-radius: 0 4px 4px 0; }

  /* ---------- Mode toggle (List / Calendar) ---------- */
  .mode-toggle { display: inline-flex; margin: 0.2rem 0 1.5rem; }
  .mode-toggle button {
    font-family: var(--sans); font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0.42rem 1rem; border: 1px solid var(--hairline); background: transparent;
    color: var(--dim); cursor: pointer; transition: all 0.15s;
  }
  .mode-toggle button:hover { color: var(--ink); }
  .mode-toggle button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .mode-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .mode-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: 0; }

  /* ---------- Calendar grid ---------- */
  .cal-head { display: flex; align-items: center; justify-content: center; gap: 1.4rem; margin: 0.4rem 0 1.1rem; }
  .cal-head .cal-title { font-family: var(--serif); font-size: 1.6rem; color: var(--accent); letter-spacing: 0.01em; min-width: 11rem; text-align: center; }
  .cal-nav {
    width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--hairline);
    background: transparent; color: var(--ink); font-size: 1.15rem; line-height: 1; cursor: pointer; transition: all 0.15s;
  }
  .cal-nav:hover { border-color: var(--ink); background: color-mix(in srgb, var(--ink) 7%, transparent); }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--hairline); }
  .cal-dow span { font-family: var(--sans); font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); text-align: center; padding: 0.5rem 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell {
    min-height: 170px; border-right: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline);
    padding: 0.35rem 0.4rem 0.55rem; overflow: hidden;
  }
  .cal-cell:nth-child(7n+1) { border-left: 1px solid var(--hairline); }
  .cal-cell.blank { background: color-mix(in srgb, var(--hairline) 16%, transparent); }
  .cal-cell .daynum { font-family: var(--sans); font-size: 0.78rem; color: var(--dim); text-align: right; display: block; }
  .cal-cell.today .daynum { color: var(--paper); background: var(--accent); border-radius: 50%; width: 1.55rem; height: 1.55rem; line-height: 1.55rem; text-align: center; margin-left: auto; }
  .cal-ev {
    display: block; font-family: var(--sans); font-size: 0.76rem; line-height: 1.3; margin-top: 0.26rem;
    padding: 0.18rem 0.4rem; border-left: 3px solid var(--cat-other); border-radius: 3px;
    background: color-mix(in srgb, var(--cat-other) 12%, transparent); color: var(--ink); text-decoration: none;
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cal-ev:hover { background: color-mix(in srgb, var(--c, var(--cat-other)) 22%, transparent); }
  .cal-ev .evtime { font-weight: 700; }
  .cal-ev.cont { border-left-style: solid; border-radius: 0; background: color-mix(in srgb, var(--c, var(--cat-other)) 13%, transparent); }
  .cal-ev.cont.is-end { border-radius: 0 3px 3px 0; }
  .cal-ongoing { display: flex; flex-wrap: wrap; gap: 0.45rem 0.9rem; align-items: baseline; padding: 0.55rem 0.2rem 0.8rem; }
  .cal-ongoing-head { font-family: var(--sans); font-size: 0.64rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
  .cal-ongoing-item { font-family: var(--sans); font-size: 0.72rem; color: var(--ink); text-decoration: none; border-left: 3px solid var(--c, var(--cat-other)); padding-left: 0.4rem; }
  .cal-ongoing-item:hover { color: var(--accent); }
  .cal-ongoing-span { color: var(--dim); font-size: 0.66rem; }
  .cal-ongoing-chip { display: block; font-family: var(--sans); font-size: 0.62rem; color: var(--dim); margin-top: 0.25rem; cursor: help; }
  .cal-more { font-family: var(--sans); font-size: 0.64rem; color: var(--dim); margin-top: 0.2rem; display: block; }
  @media (max-width: 640px) {
    .cal-cell { min-height: 76px; padding: 0.2rem; }
    .cal-ev { font-size: 0.58rem; padding: 0.1rem 0.22rem; }
    .cal-dow span { font-size: 0.56rem; }
    .cal-head .cal-title { font-size: 1.2rem; min-width: 8rem; }
  }

  /* ---------- Count line ---------- */
  .count-line {
    text-align: center; font-family: var(--sans); font-size: 0.82rem; color: var(--dim);
    letter-spacing: 0.04em; margin-bottom: 1.4rem;
  }
  .count-line strong { color: var(--ink); font-weight: 600; }

  /* ---------- Date group header ---------- */
  .month-group { margin-top: 2.2rem; }
  .month-group:first-of-type { margin-top: 0.8rem; }
  .month-head {
    font-family: var(--display); font-weight: 400; font-size: 0.92rem;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--dim);
    border-bottom: 1px solid var(--hairline); padding-bottom: 0.5rem; margin-bottom: 1.1rem;
  }

  /* ---------- Event entry ---------- */
  .event {
    display: grid; grid-template-columns: 70px 1fr; gap: 1.2rem;
    padding: 0.95rem 0.4rem; border-bottom: 1px solid var(--hairline);
    align-items: start;
  }
  .event:last-child { border-bottom: none; }
  .event .date-col {
    font-family: var(--display); color: var(--dim); text-align: right;
  }
  .event .date-col .day { font-size: 1.6rem; font-weight: 400; line-height: 1; color: var(--ink); }
  .event .date-col .mon { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.2rem; }
  .event .date-col .time { font-family: var(--sans); font-size: 0.72rem; color: var(--dim); margin-top: 0.3rem; }

  .event .body-col { min-width: 0; }
  .event .body-col .title {
    font-family: var(--display); font-size: 1.05rem; font-weight: 400; line-height: 1.35;
    color: var(--ink); margin-bottom: 0.25rem;
  }
  .event .body-col .title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; }
  .event .body-col .title a:hover { border-bottom-color: var(--accent); }
  .event .body-col .meta {
    font-family: var(--serif); font-style: italic; font-size: 0.96rem; color: var(--dim);
    margin-bottom: 0.25rem;
  }
  .event .body-col .venue {
    font-family: var(--sans); font-size: 0.78rem; color: var(--dim); letter-spacing: 0.02em;
  }
  .event .body-col .type-tag {
    display: inline-block; font-family: var(--sans); font-size: 0.66rem; text-transform: uppercase;
    letter-spacing: 0.1em; padding: 0.18rem 0.62rem; border: 1px solid var(--hairline);
    border-radius: 999px; color: var(--dim); margin-top: 0.45rem; line-height: 1.3;
    background: transparent; cursor: pointer; transition: background 0.15s;
  }
  .event .body-col .type-tag:hover { background: color-mix(in srgb, currentColor 14%, transparent); }

  /* Past events get muted */
  .event.past { opacity: 0.62; }
  .event.past .date-col .day, .event.past .body-col .title { color: var(--dim); }

  /* Empty state */
  .empty-state {
    text-align: center; font-family: var(--serif); font-style: italic;
    color: var(--dim); padding: 4rem 1rem;
  }

  /* ---------- Footer ---------- */
  .rss-link {
    display:inline-block; margin-left:0.6rem; padding:0.45em 1.1em;
    font-family:inherit; font-size:0.78rem; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--fg-soft,#9a8f80); border:1px solid var(--fg-soft,#9a8f80); border-radius:999px;
    text-decoration:none; vertical-align:middle;
  }
  .rss-link:hover { color:var(--fg,#e8e0d2); border-color:var(--fg,#e8e0d2); }
  footer.cv-footer {
    margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--hairline);
    text-align: center; font-family: var(--sans); font-size: 0.78rem; color: var(--dim);
    letter-spacing: 0.04em;
  }
  footer.cv-footer a { color: inherit; border-bottom: 1px dotted currentColor; text-decoration: none; }

  @media (max-width: 640px) {
    body { padding: 1.6rem 0.9rem 5rem; font-size: 16px; }
    header.cv-header h1 { font-size: 1.7rem; }
    .event { grid-template-columns: 56px 1fr; gap: 0.85rem; }
    .event .date-col .day { font-size: 1.35rem; }
    .event .body-col .title { font-size: 0.98rem; }
    .filter-nav button { font-size: 0.72rem; padding: 0.35rem 0.7rem; }
  }
</style>

<body>
<style id="ss-fz-style">.ss-fz{position:fixed;top:.9rem;right:3.3rem;z-index:1000;display:inline-flex;gap:.25rem;align-items:center}.ss-fz button{width:30px;height:30px;padding:0;border:1px solid currentColor;border-radius:50%;background:transparent;color:inherit;opacity:.7;font:600 12px/1 system-ui,sans-serif;cursor:pointer;transition:opacity .2s,transform .15s}.ss-fz button:hover{opacity:1;transform:scale(1.05)}.ss-fz button:focus-visible{outline:2px solid currentColor;outline-offset:2px;opacity:1}@media print{.ss-fz{display:none!important}}</style><button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false"><span class="sun" aria-hidden="true">&#9728;</span><span class="moon" aria-hidden="true">&#9790;</span></button><div class="ss-fz" aria-label="Adjust text size"><button type="button" data-fz="down" title="Decrease text size">A-</button><button type="button" data-fz="up" title="Increase text size">A+</button><button type="button" data-fz="reset" class="reset" title="Reset text size" style="display:none">&#8634;</button></div>

<main>
  <header class="cv-header">
    <h1>Polymyth Seminar Calendar</h1>
    <div class="meta">Toronto · GTA · Hamilton · Guelph · Waterloo</div>
    <div class="tag">Lectures, conferences, workshops, readings, festivals, exhibitions</div>
  </header>

  <nav class="filter-nav" id="filterNav">
    <button type="button" data-cat="all" class="on">All</button>
    <button type="button" data-cat="lecture">Lecture</button>
    <button type="button" data-cat="conference">Conference</button>
    <button type="button" data-cat="workshop">Workshop</button>
    <button type="button" data-cat="reading">Reading</button>
    <button type="button" data-cat="festival">Festival</button>
    <button type="button" data-cat="exhibition">Exhibition</button>
    <button type="button" data-cat="performance">Performance</button>
    <button type="button" data-cat="screening">Screening</button>
    <button type="button" data-cat="gathering">Gathering</button>
    <button type="button" data-cat="protest">Protest</button>
    <button type="button" data-cat="community">Community</button>

<script>
/* ============================================================
   POLYMYTH SEMINAR CALENDAR
   - Loads /polymythseminars/events.json, with an inline snapshot fallback
   - "Next 12 months" view: 1 week back + 1 year forward from today
   - "All dates" view: every event in the file
   - Category filter: click a pill or an event tag to filter
   - Empty category and age tabs are hidden after load
   - List, calendar grid, and homepage teaser share this data
============================================================ */

const TYPE_TO_CATEGORY = {
  'lecture': 'lecture',
  'talk': 'lecture',
  'book-talk': 'lecture',
  'scholar-talk': 'lecture',
  'artist-talk': 'lecture',
  'conference': 'conference',
  'symposium': 'conference',
  'colloquium': 'conference',
  'forum': 'conference',
  'workshop': 'workshop',
  'webinar': 'workshop',
  'meeting': 'workshop',
  'retreat': 'workshop',
  'reading': 'reading',
  'book-launch': 'reading',
  'residency': 'reading',
  'festival': 'festival',
  'festival-of-form': 'festival',
  'cultural-reproduction': 'festival',
  'exhibition': 'exhibition',
  'site-specific-art': 'exhibition',
  'performance': 'performance',
  'screening': 'screening',
  'cfp': 'cfp',
  'contest': 'contest',
  'defence': 'lecture',
  'gathering': 'gathering',
  'memorial': 'gathering',
  'celebration': 'gathering',
  'networking': 'gathering',
  'panel': 'lecture', 'protest': 'protest', 'demonstration': 'protest', 'march': 'protest', 'rally': 'protest', 'picket': 'protest', 'vigil': 'protest', 'sit-in': 'protest', 'walkout': 'protest'
};

const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let ALL_EVENTS = [];
let activeCategory = 'all';
let activeView = 'default';
let activeAge = 'all';
let activeMode = 'list';
let calMonth = null;

function catOf(type){ return TYPE_TO_CATEGORY[type] || 'other'; }
function ageBucket(ab, type){
  var t = ab ? String(ab).toLowerCase() : '';
  if (t){
    if (/all ?ages|all-ages|family|everyone|open to all/.test(t)) return 'allages';
    if (/youth|teen|child|kid|junior|minor|under ?1[0-8]|grade|k-?12|secondary|high ?school|elementary|ages? ?\d{1,2}\s*[\u2013-]\s*1[0-8]\b/.test(t)) return 'youth';
    if (/adult|18\+|over ?18|mature|undergrad|graduate|emerging|professional|university|post-?secondary/.test(t)) return 'adult';
  }
  // No explicit age band: infer from the event type so the age tabs are not
  // permanently empty. Scholarly and submission events read adult; public
  // cultural events read all-ages. Youth requires an explicit signal above.
  var cat = catOf(type);
  if (cat === 'lecture' || cat === 'conference' || cat === 'cfp' || cat === 'workshop' || cat === 'contest') return 'adult';
  return 'allages';
}

function fetchEventsWithFallback(){
  // Primary: the published events file, fetched fresh. If it cannot be reached
  // (a deploy blip, offline, or a preview sandbox with no server) fall back to
  // the inline snapshot embedded in this page, so the calendar never blanks.
  // The fetched file is always preferred and current; the snapshot is a backup.
  var urls = ['/polymythseminars/events.json?v=20260606'];
  return (async function(){
    var lastErr = null;
    for (var i=0;i<urls.length;i++){
      try {
        var r = await fetch(urls[i], { cache: 'no-store' });
        if (!r.ok) { lastErr = new Error(urls[i]+' \u2192 HTTP '+r.status); continue; }
        var d = await r.json();
        if ((d.events||[]).length) { d._loadedFrom = urls[i]; return d; }
        lastErr = new Error(urls[i]+' \u2192 parsed but empty');
      } catch(e){ lastErr = new Error(urls[i]+' \u2192 '+(e.message||e)); }
    }
    try {
      var el = document.getElementById('events-fallback');
      if (el) { var fb = JSON.parse(el.textContent); if ((fb.events||[]).length){ fb._loadedFrom = 'embedded snapshot'; return fb; } }
    } catch(e2){ lastErr = e2; }
    throw lastErr || new Error('all event sources failed');
  })();
}

async function loadEvents() {
  try {
    const data = await fetchEventsWithFallback();
    console.log('calendar events loaded from', data._loadedFrom);
    ALL_EVENTS = data.events.map(e => {
      const cats = [e.type].concat(e.secondary_types || []).map(t => TYPE_TO_CATEGORY[t] || 'other').filter((c,i,arr) => arr.indexOf(c) === i);
      return { ...e, _date: new Date(e.date), _category: TYPE_TO_CATEGORY[e.type] || 'other', _categories: cats, _ageBucket: ageBucket(e.age_band, e.type) };
    }).filter(e => !isNaN(e._date.getTime()));
    ALL_EVENTS.sort((a,b) => a._date - b._date);
    hideEmptyFilters();
    render();
  } catch (err) {
    document.getElementById('eventsContainer').innerHTML =
      '<div class="empty-state">Could not load events. Last failure: ' + String(err && err.message || err) + '</div>';
    console.error(err);
  }
}

function getFilteredEvents() {
  const now = new Date();
  let events = ALL_EVENTS;

  // Default view: 1 week back, 1 year forward
  if (activeView === 'default') {
    const start = new Date(now); start.setDate(start.getDate() - 7);
    const end = new Date(now); end.setFullYear(end.getFullYear() + 1);
    events = events.filter(e => e._date >= start && e._date <= end);
  }

  // Category filter (matches primary or any secondary type)
  if (activeCategory !== 'all') {
    events = events.filter(e => (e._categories || [e._category]).includes(activeCategory));
  }

  // Age filter
  if (activeAge !== 'all') {
    events = events.filter(e => e._ageBucket === activeAge);
  }

  return events;
}

function eventCard(e, isChild) {
  const now = new Date();
  const isPast = e._date < now;
  const day = e._date.getDate();
  const mon = MONTHS_SHORT[e._date.getMonth()];
  const hours = e._date.getHours();
  const mins = e._date.getMinutes();
  const hasTime = hours !== 0 || mins !== 0;
  const timeStr = hasTime ? `${(hours%12||12)}:${String(mins).padStart(2,'0')}${hours<12?'a':'p'}` : '';

  let rangeHtml = '';
  if (e.end_date) {
    const ed = new Date(e.end_date);
    if (!isNaN(ed.getTime()) && (ed.getDate() !== day || ed.getMonth() !== e._date.getMonth() || ed.getFullYear() !== e._date.getFullYear())) {
      const sameMonth = ed.getMonth() === e._date.getMonth() && ed.getFullYear() === e._date.getFullYear();
      const rs = sameMonth
        ? `${mon} ${day}\u2013${ed.getDate()}`
        : `${mon} ${day} \u2013 ${MONTHS_SHORT[ed.getMonth()]} ${ed.getDate()}`;
      rangeHtml = `<div class="daterange">${rs}</div>`;
    }
  }

  const title = e.source_url
    ? `<a href="${e.source_url}" target="_blank" rel="noopener">${escapeHtml(e.title)}</a>`
    : escapeHtml(e.title);
  const speaker = e.speaker_or_director ? `<div class="meta">${escapeHtml(e.speaker_or_director)}</div>` : '';
  const venue = e.venue ? `<div class="venue">${escapeHtml(e.venue)}</div>` : '';
  const ageHtml = e.age_band ? `<div class="venue age">${escapeHtml(e.age_band)}</div>` : '';

  // Tags show the filter CATEGORY (deduped), not the raw sub-type, so every tag
  // matches a pill in the filter row. Clicking a tag applies that category filter.
  const CAT_LABEL = { lecture:'Lecture', conference:'Conference', workshop:'Workshop', reading:'Reading', festival:'Festival', exhibition:'Exhibition', performance:'Performance', screening:'Screening', gathering:'Gathering', protest:'Protest', community:'Community', cfp:'Call for Papers', contest:'Contest', other:'Other' };
  const cats = (e._categories && e._categories.length ? e._categories : [catOf(e.type)]).filter((c,i,arr) => arr.indexOf(c) === i);
  const tags = cats.map(c =>
    `<button type="button" class="type-tag" data-cat="${c}" style="color:var(--cat-${c});border-color:var(--cat-${c})">${CAT_LABEL[c] || c}</button>`
  ).join('');

  const primaryCat = e._category || 'other';
  const parentClass = e.is_parent_festival ? ' is-parent' : '';
  return `
    <div class="event${isPast ? ' past' : ''}${parentClass}" data-date="${escapeHtml(e.date)}" style="border-left-color:var(--cat-${primaryCat})">
      <div class="date-col">
        <div class="day">${day}</div>
        <div class="mon">${mon}</div>
        ${timeStr ? `<div class="time">${timeStr}</div>` : ''}
      </div>
      <div class="body-col">
        <div class="title">${title}</div>
        ${rangeHtml}
        ${speaker}
        ${venue}
        ${ageHtml}
        <div class="type-tags">${tags}</div>
      </div>
    </div>`;
}

function render() {
  const events = getFilteredEvents();
  const container = document.getElementById('eventsContainer');
  const countLine = document.getElementById('countLine');

  const totalEvents = ALL_EVENTS.length;
  const shownEvents = events.length;
  const viewLabel = activeView === 'default' ? 'next 12 months' : 'all dates';
  const catLabel = activeCategory === 'all' ? '' : ` \u00b7 ${activeCategory}`;
  const ageLabel = activeAge === 'all' ? '' : ` \u00b7 age: ${activeAge}`;
  countLine.innerHTML = `<strong>${shownEvents}</strong> of ${totalEvents} events &nbsp;\u00b7&nbsp; ${viewLabel}${catLabel}${ageLabel}`;

  if (events.length === 0) {
    container.innerHTML = '<div class="empty-state">No events match the current filter.</div>';
    return;
  }

  // Nesting: children whose parent is also in view render under the parent
  const idsInView = new Set(events.map(e => e.id).filter(Boolean));
  const childrenByParent = {};
  const nested = new Set();
  events.forEach(e => {
    if (e.parent_id && idsInView.has(e.parent_id)) {
      (childrenByParent[e.parent_id] = childrenByParent[e.parent_id] || []).push(e);
      nested.add(e);
    }
  });
  const topLevel = events.filter(e => !nested.has(e));

  const groups = {};
  topLevel.forEach(e => {
    const key = `${e._date.getFullYear()}-${String(e._date.getMonth()).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = { label: `${MONTHS_LONG[e._date.getMonth()]} ${e._date.getFullYear()}`, items: [] };
    groups[key].items.push(e);
  });

  let html = '';
  Object.keys(groups).sort().forEach(key => {
    const g = groups[key];
    html += `<div class="month-group"><div class="month-head">${g.label}</div>`;
    g.items.forEach(e => {
      html += eventCard(e, false);
      const kids = childrenByParent[e.id];
      if (kids && kids.length) {
        kids.sort((a,b) => a._date - b._date);
        html += `<button type="button" class="sub-toggle" data-sub="${e.id}" aria-expanded="false">\u25B8 ${kids.length} events within</button>`;
        html += `<div class="subevents" data-sub-group="${e.id}" hidden>` + kids.map(k => eventCard(k, true)).join('') + `</div>`;
      }
    });
    html += `</div>`;
  });

  container.innerHTML = html;
}

function pad2(n){ return String(n).padStart(2, '0'); }
function dayKey(d){ return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }

function calFilteredEvents(){
  return ALL_EVENTS.filter(function(e){
    var catOk = activeCategory === 'all' || (e._categories || [e._category]).indexOf(activeCategory) !== -1;
    var ageOk = activeAge === 'all' || e._ageBucket === activeAge;
    return catOk && ageOk;
  });
}

// When a filter is applied in calendar mode, land on the first month that
// actually has matching events (preferring the next one from today), so the
// grid never shows an empty month while matches exist elsewhere.
function firstCalMonthWithEvents(){
  var evs = calFilteredEvents();
  var n = new Date();
  var curStart = new Date(n.getFullYear(), n.getMonth(), 1);
  if (!evs.length) return curStart;
  var spanOf = function(e){
    var s = new Date(e._date.getFullYear(), e._date.getMonth(), e._date.getDate());
    var en = s;
    if (e.end_date){ var x = new Date(e.end_date); if (!isNaN(x.getTime())) en = new Date(x.getFullYear(), x.getMonth(), x.getDate()); }
    return [s, en];
  };
  var curEnd = new Date(n.getFullYear(), n.getMonth() + 1, 0);
  if (evs.some(function(e){ var sp = spanOf(e); return sp[0] <= curEnd && sp[1] >= curStart; })) return curStart;
  var todayMid = new Date(n.getFullYear(), n.getMonth(), n.getDate());
  var fut = evs.filter(function(e){ return spanOf(e)[1] >= todayMid; }).sort(function(a,b){ return a._date - b._date; });
  var pick = fut.length ? fut[0] : evs.slice().sort(function(a,b){ return a._date - b._date; })[0];
  return new Date(pick._date.getFullYear(), pick._date.getMonth(), 1);
}

function renderCalendar(){
  var container = document.getElementById('calendarContainer');
  var countLine = document.getElementById('countLine');
  var today = new Date();
  if (!calMonth) calMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  var year = calMonth.getFullYear(), month = calMonth.getMonth();
  var events = calFilteredEvents();

  // Map YYYY-MM-DD -> [{ e, isStart, isEnd }], walking each event's day span.
  var byDay = {};
  events.forEach(function(e){
    var start = new Date(e._date.getFullYear(), e._date.getMonth(), e._date.getDate());
    var end = start;
    if (e.end_date){
      var ed = new Date(e.end_date);
      if (!isNaN(ed.getTime())) end = new Date(ed.getFullYear(), ed.getMonth(), ed.getDate());
    }
    if (end < start) end = start;
    var d = new Date(start), guard = 0;
    while (d <= end && guard < 400){
      if (d.getFullYear() === year && d.getMonth() === month){
        var k = dayKey(d);
        (byDay[k] = byDay[k] || []).push({ e: e, isStart: d.getTime() === start.getTime(), isEnd: d.getTime() === end.getTime() });
      }
      d.setDate(d.getDate() + 1); guard++;
    }
  });

  var firstDow = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var todayKey = dayKey(today);
  var dows = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];

  var html = '';
  html += '<div class="cal-head">';
  html += '<button type="button" class="cal-nav" data-cal="prev" aria-label="Previous month">\u2039</button>';
  html += '<span class="cal-title">' + MONTHS_LONG[month] + ' ' + year + '</span>';
  html += '<button type="button" class="cal-nav" data-cal="next" aria-label="Next month">\u203A</button>';
  html += '</div>';
  // Ongoing strip: every multi-day run that covers this month but starts
  // before it, named once with its span and link, instead of flooding cells.
  var mFirst = new Date(year, month, 1), mLast = new Date(year, month + 1, 0);
  var ongoing = events.filter(function(e){
    if (!e.end_date) return false;
    var s = new Date(e._date.getFullYear(), e._date.getMonth(), e._date.getDate());
    var x = new Date(e.end_date);
    if (isNaN(x.getTime())) return false;
    var en = new Date(x.getFullYear(), x.getMonth(), x.getDate());
    return s < mFirst && en >= mFirst && s <= mLast;
  }).sort(function(a,b){ return new Date(a.end_date) - new Date(b.end_date); });
  if (ongoing.length){
    html += '<div class="cal-ongoing"><span class="cal-ongoing-head">Ongoing this month</span>';
    ongoing.forEach(function(e){
      var cat = e._category || 'other';
      var x = new Date(e.end_date);
      var span = 'to ' + MONTHS_SHORT[x.getMonth()] + ' ' + x.getDate() + (x.getFullYear() !== year ? ' ' + x.getFullYear() : '');
      var body = escapeHtml(e.title) + ' <span class="cal-ongoing-span">' + span + '</span>';
      if (e.source_url)
        html += '<a class="cal-ongoing-item" href="' + e.source_url + '" target="_blank" rel="noopener" style="--c:var(--cat-' + cat + ')">' + body + '</a>';
      else
        html += '<span class="cal-ongoing-item" style="--c:var(--cat-' + cat + ')">' + body + '</span>';
    });
    html += '</div>';
  }
  html += '<div class="cal-dow">' + dows.map(function(d){ return '<span>' + d + '</span>'; }).join('') + '</div>';
  html += '<div class="cal-grid">';

  for (var b = 0; b < firstDow; b++) html += '<div class="cal-cell blank"></div>';

  for (var day = 1; day <= daysInMonth; day++){
    var dObj = new Date(year, month, day);
    var k = dayKey(dObj);
    html += '<div class="cal-cell' + (k === todayKey ? ' today' : '') + '">';
    html += '<span class="daynum">' + day + '</span>';
    var list = (byDay[k] || []).slice().sort(function(a, bb){ return a.e._date - bb.e._date; });
    // Split the day: real entries (single-day events and the true start of a
    // multi-day run) get titled pills; days merely covered by a long run
    // collapse into one compact ongoing chip, so exhibitions that span months
    // no longer wallpaper every cell and bury that day's actual schedule.
    var starts = list.filter(function(it){ return it.isStart; });
    var conts = list.filter(function(it){ return !it.isStart; });
    var ends = conts.filter(function(it){ return it.isEnd; });
    var shown = starts.slice(0, 5);
    shown.forEach(function(item){
      var e = item.e;
      var cat = e._category || 'other';
      var hrs = e._date.getHours(), mins = e._date.getMinutes();
      var hasTime = (hrs !== 0 || mins !== 0);
      var timeStr = hasTime ? ((hrs % 12 || 12) + (mins ? ':' + pad2(mins) : '') + (hrs < 12 ? 'a' : 'p')) : '';
      var label = escapeHtml(e.title);
      if (e.end_date){
        var ed2 = new Date(e.end_date);
        if (!isNaN(ed2.getTime()) && !(ed2.getFullYear() === year && ed2.getMonth() === month && ed2.getDate() === day))
          label += ' <span style="opacity:.6">(to ' + MONTHS_SHORT[ed2.getMonth()] + ' ' + ed2.getDate() + ')</span>';
      }
      var inner = (timeStr ? '<span class="evtime">' + timeStr + '</span> ' : '') + label;
      var sc = 'border-left-color:var(--cat-' + cat + ');background:color-mix(in srgb,var(--cat-' + cat + ') 11%,transparent);--c:var(--cat-' + cat + ')';
      if (e.source_url)
        html += '<a class="cal-ev" href="' + e.source_url + '" target="_blank" rel="noopener" style="' + sc + '" title="' + escapeHtml(e.title) + '">' + inner + '</a>';
      else
        html += '<span class="cal-ev" style="' + sc + '" title="' + escapeHtml(e.title) + '">' + inner + '</span>';
    });
    var hiddenStarts = starts.length - shown.length;
    if (conts.length){
      var contNames = conts.map(function(it){ return it.e.title + (it.isEnd ? ' (ends today)' : ''); }).join('\n');
      var endNote = ends.length ? ' \u00b7 ' + ends.length + ' end' + (ends.length === 1 ? 's' : '') + ' today' : '';
      html += '<span class="cal-ongoing-chip" title="' + escapeHtml(contNames) + '">\u25cf ' + conts.length + ' ongoing' + endNote + '</span>';
    }
    if (hiddenStarts > 0) html += '<span class="cal-more">+' + hiddenStarts + ' more</span>';
    html += '</div>';
  }

  var totalCells = firstDow + daysInMonth;
  var trailing = (7 - (totalCells % 7)) % 7;
  for (var t = 0; t < trailing; t++) html += '<div class="cal-cell blank"></div>';
  html += '</div>';
  container.innerHTML = html;

  var mStart = new Date(year, month, 1), mEnd = new Date(year, month + 1, 0);
  var inMonth = events.filter(function(e){
    var s = new Date(e._date.getFullYear(), e._date.getMonth(), e._date.getDate());
    var en = s;
    if (e.end_date){ var x = new Date(e.end_date); if (!isNaN(x.getTime())) en = new Date(x.getFullYear(), x.getMonth(), x.getDate()); }
    return s <= mEnd && en >= mStart;
  }).length;
  var catLabel = activeCategory === 'all' ? '' : ' \u00b7 ' + activeCategory;
  var ageLabel = activeAge === 'all' ? '' : ' \u00b7 age: ' + activeAge;
  countLine.innerHTML = '<strong>' + inMonth + '</strong> events in ' + MONTHS_LONG[month] + ' ' + year + catLabel + ageLabel;
}

function dispatchRender(){
  var ec = document.getElementById('eventsContainer');
  var cc = document.getElementById('calendarContainer');
  var vt = document.querySelector('.view-toggle');
  document.body.classList.toggle('cal-mode', activeMode === 'calendar');
  if (activeMode === 'calendar'){
    ec.hidden = true; cc.hidden = false;
    if (vt) vt.style.display = 'none';
    calMonth = firstCalMonthWithEvents();
    renderCalendar();
  } else {
    ec.hidden = false; cc.hidden = true;
    if (vt) vt.style.display = '';
    render();
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
   EVENT BINDINGS
============================================================ */
document.getElementById('filterNav').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  const cat = e.target.dataset.cat;
  activeCategory = cat;
  document.querySelectorAll('#filterNav button').forEach(b => b.classList.toggle('on', b.dataset.cat === cat));
  dispatchRender();
});

document.getElementById('ageNav').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  activeAge = e.target.dataset.age;
  document.querySelectorAll('#ageNav button').forEach(b => b.classList.toggle('on', b.dataset.age === activeAge));
  dispatchRender();
});

document.querySelector('.view-toggle').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  const view = e.target.dataset.view;
  activeView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('on', b.dataset.view === view));
  render();
  // All dates opens at the earliest event (2025); jump the reader to today so
  // the past sits above and the present is what they land on.
  if (view === 'all') setTimeout(scrollToToday, 60);
});

document.querySelector('.mode-toggle').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  activeMode = e.target.dataset.mode;
  document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.toggle('on', b.dataset.mode === activeMode));
  dispatchRender();
});

document.getElementById('calendarContainer').addEventListener('click', e => {
  const nav = e.target.closest('[data-cal]');
  if (!nav) return;
  if (!calMonth) calMonth = new Date();
  calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + (nav.dataset.cal === 'next' ? 1 : -1), 1);
  renderCalendar();
});

document.getElementById('eventsContainer').addEventListener('click', function(ev){
  // Clicking a category tag on an event applies that filter.
  var tag = ev.target.closest('.type-tag');
  if (tag && tag.dataset.cat){
    ev.preventDefault();
    activeCategory = tag.dataset.cat;
    document.querySelectorAll('#filterNav button').forEach(function(b){ b.classList.toggle('on', b.dataset.cat === activeCategory); });
    dispatchRender();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  var btn = ev.target.closest('.sub-toggle');
  if (!btn) return;
  ev.preventDefault();
  var grp = document.querySelector('.subevents[data-sub-group="' + btn.dataset.sub + '"]');
  if (!grp) return;
  var willOpen = grp.hidden;
  grp.hidden = !willOpen;
  btn.classList.toggle('open', willOpen);
  btn.setAttribute('aria-expanded', String(willOpen));
  btn.innerHTML = (willOpen ? '\u25BE' : '\u25B8') + ' ' + grp.children.length + ' events within';
});

function hideEmptyFilters(){
  var catCount = {}, ageCount = {};
  ALL_EVENTS.forEach(function(e){
    (e._categories || [e._category]).forEach(function(c){ catCount[c] = (catCount[c] || 0) + 1; });
    if (e._ageBucket) ageCount[e._ageBucket] = (ageCount[e._ageBucket] || 0) + 1;
  });
  document.querySelectorAll('#filterNav button[data-cat]').forEach(function(b){
    if (b.dataset.cat !== 'all') b.style.display = catCount[b.dataset.cat] ? '' : 'none';
  });
  document.querySelectorAll('#ageNav button[data-age]').forEach(function(b){
    if (b.dataset.age !== 'all') b.style.display = ageCount[b.dataset.age] ? '' : 'none';
  });
}

function scrollToToday(){
  var todayKey = new Date().toISOString().slice(0, 10);
  var els = document.querySelectorAll('#eventsContainer .event[data-date]');
  for (var i = 0; i < els.length; i++){
    if ((els[i].getAttribute('data-date') || '').slice(0, 10) >= todayKey){
      els[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }
  }
}

loadEvents();
