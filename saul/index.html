<style>
  :root {
    --bg: #F5EBE4;
    --bg-rgb: 245, 235, 228;
    --fg: #2C2C2C;
    /* Muted text color, darkened from #8a8278 (failed WCAG AA at 3.2:1
       against the cream bg) to #5e574d (passes AA at 5.6:1). Applies to
       dates, italic notes, certification dates, language switcher inactive
       state, and other muted text site-wide on this page. */
    --muted: #5e574d;
    /* Rule color slightly darkened from #d4cfc4 for cleaner visible hierarchy.
       Decorative-line use, not text, does not need AA. */
    --rule: #c3bcae;
    /* Accent darkened from #A07A2C (failed AA at 3.66:1 when used as text)
       to #7d5f1f (passes AA at 5.4:1). Used for active language tab, active
       filter pills, and accent text, all of which benefit from readable
       contrast. Decorative uses (border, gasket) unaffected by hue shift. */
    --accent-light: #7d5f1f;
  --accent-dark: #d4a44d;
  --accent: var(--accent-light);
    --accent-soft: rgba(125, 95, 31, 0.10);
    --accent-line: rgba(125, 95, 31, 0.35);
    --geo-density: 0.06;
    --serif: 'Cormorant Garamond', 'Garamond', 'Georgia', serif;
    --body: 'Libre Baskerville', 'Georgia', serif;
    --sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  /* Thin, themed scrollbar so the right bar reads as a hairline, not a grey slab */
  html { scrollbar-width: thin; scrollbar-color: rgba(160,122,44,0.35) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(160,122,44,0.32); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(160,122,44,0.55); }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    transition: background-color 0.6s ease;
    position: relative;
  }
  /* Color tint wash, when one or more categories filtered, page gets a faint
     wash mixing all their colors. Single click = single category color.
     Multiple = mathematical average. Goes through ::before so it sits above
     the bg but below all content. */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: var(--tint-overlay, transparent);
    transition: background 0.6s ease;
  }
  a { color: inherit; }

  /* ===== GEOMETRY WATERMARK (Apollonian gasket from index.html) ===== */
  .geo {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .geo svg {
    width: 100vh;
    height: 100vh;
    max-width: 100vw;
    opacity: var(--geo-density);
    color: var(--accent);
    transform: scale(var(--geo-scale, 1.4)) translate(var(--geo-tx, 0px), var(--geo-ty, 0px));
    transform-origin: center center;
    transition: transform 1.6s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
  }

  /* ===== PROFESSIONAL MODE (default), geometry muted ===== */
  body:not(.party) { --geo-density: 0.04 !important; }
  body.party { --geo-density: 0.16; }

  /* ===== PAGE WRAPPER ===== */
  .page {
    position: relative;
    z-index: 5;
    max-width: var(--content-width, 768px);
    margin: 0 auto;
    padding: 6rem 1.5rem 4rem;
  }

  /* ===== LANGUAGE SWITCHER ===== */
  .langs {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .langs button {
    font-family: var(--serif);
    background: none;
    border: none;
    cursor: pointer;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid transparent;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 400;
    transition: all 0.25s ease;
  }
  .langs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
    font-size: 0.95rem;
  }
  .langs button:hover { opacity: 0.75; }

  /* ===== HEADER ===== */
  header.cv-header {
    text-align: center;
    margin-bottom: 0.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--accent);
  }
  header.cv-header h1 {
    font-family: var(--serif);
    font-size: 2.5rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0;
  }
  header.cv-header h1 .post {
    font-weight: 400;
    font-size: 1.2rem;
    letter-spacing: 0.06em;
    vertical-align: baseline;
  }
  header.cv-header .meta {
    font-family: var(--body);
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
  }
  header.cv-header .cv-head-row { display:flex; align-items:flex-end; justify-content:space-between; gap:1.2rem; flex-wrap:wrap; text-align:left; }
  header.cv-header .cv-head-row h1 { margin:0; }
  header.cv-header .cv-contact { text-align:right; }
  header.cv-header .cv-contact .meta { margin-top:0; }

  /* ===== FILTER NAV ===== */
  .filter-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
    margin: 1.5rem 0 1rem;
  }
  .filter-nav button {
    font-family: var(--body);
    font-size: 0.63rem;
    padding: 0.3rem 0.7rem;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--muted);
    font-weight: 400;
    transition: all 0.25s ease;
  }
  .filter-nav button.on {
    border: 1.5px solid var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 700;
  }
  /* category colors, theme-aware, light values, dark variants below */
  :root {
    --cat-kitchen:#8B6914; --cat-teaching:#1A5276; --cat-community:#1A6E4E;
    --cat-education:#7B2D4E; --cat-volunteer:#5A5A52; --cat-performance:#4A3F8A;
    --cat-seminarschools:#7A2632;
  }
  @media (prefers-color-scheme: dark) { :root:not(.light) {
    --cat-kitchen:#D8B65A; --cat-teaching:#6FB1DA; --cat-community:#5FC79A;
    --cat-education:#DE8FB0; --cat-volunteer:#B8B4A8; --cat-performance:#9C8FE6;
    --cat-seminarschools:#E58375;
  } }
  :root.dark, :root[data-theme="dark"] {
    --cat-kitchen:#D8B65A; --cat-teaching:#6FB1DA; --cat-community:#5FC79A;
    --cat-education:#DE8FB0; --cat-volunteer:#B8B4A8; --cat-performance:#9C8FE6;
    --cat-seminarschools:#E58375;
  }
  .filter-nav button[data-cat="kitchen"].on { border-color: var(--cat-kitchen); background: color-mix(in srgb, var(--cat-kitchen) 12%, transparent); color: var(--cat-kitchen); }
  .filter-nav button[data-cat="teaching"].on { border-color: var(--cat-teaching); background: color-mix(in srgb, var(--cat-teaching) 12%, transparent); color: var(--cat-teaching); }
  .filter-nav button[data-cat="community"].on { border-color: var(--cat-community); background: color-mix(in srgb, var(--cat-community) 12%, transparent); color: var(--cat-community); }
  .filter-nav button[data-cat="education"].on { border-color: var(--cat-education); background: color-mix(in srgb, var(--cat-education) 12%, transparent); color: var(--cat-education); }
  .filter-nav button[data-cat="volunteer"].on { border-color: var(--cat-volunteer); background: color-mix(in srgb, var(--cat-volunteer) 12%, transparent); color: var(--cat-volunteer); }
  .filter-nav button[data-cat="performance"].on { border-color: var(--cat-performance); background: color-mix(in srgb, var(--cat-performance) 12%, transparent); color: var(--cat-performance); }
  .filter-nav button[data-cat="seminarschools"].on { border-color: var(--cat-seminarschools); background: color-mix(in srgb, var(--cat-seminarschools) 12%, transparent); color: var(--cat-seminarschools); }
  .entry .title a.ss-prop { color: inherit; text-decoration: none; border-bottom: 1px dotted #7A2632; }
  .entry .title a.ss-prop:hover { color: #7A2632; border-bottom-style: solid; }

  /* ===== ACTION BUTTONS ===== */
  .actions {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .actions button {
    font-family: var(--serif);
    font-size: 0.68rem;
    padding: 0.35rem 1.2rem;
    border: 1px solid var(--rule);
    border-radius: 2px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.25s ease;
  }
  .actions button.on {
    border: 1.5px solid var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }
  .actions button:hover { opacity: 0.75; }
  .actions .save-btn {
    border: 1px solid var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .actions .copy-on { border: 1.5px solid #1a6e4e !important; background: rgba(26,110,78,0.1) !important; color: #1a6e4e !important; font-weight: 600; }

  /* ===== FONT SIZE CONTROLS (right rail) ===== */
  .fz-controls {
    position: fixed;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 50;
  }
  .fz-controls button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    background: rgba(245, 235, 228, 0.95);
    color: var(--accent);
    font-family: var(--serif);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }
  .fz-controls button:hover { opacity: 0.7; }
  .fz-controls button.reset { border-color: var(--rule); color: var(--muted); font-size: 14px; }

  /* ===== LETTER STACK, one container, multiple letters when multiple cats active ===== */
  /* 3-column grid for collapsed letter titles. When expanded, a letter spans the full
     row so its body has room. Below 720px viewport, fall back to single column. */
  .letter-stack {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin: 0 0 2.5rem;
    align-items: start;
  }
  .letter-stack .letter-block { margin: 0; }
  .letter-stack .letter-block.expanded { grid-column: 1 / -1; }
  @media (max-width: 720px) {
    .letter-stack { grid-template-columns: 1fr; }
    .letter-stack .letter-block.expanded { grid-column: auto; }
  }

  /* ===== LETTER BLOCK (variant-specific philosophy) ===== */
  .letter-block {
    margin: 0 0 2.5rem;
    padding: 1.5rem 1.75rem;
    background: rgba(160, 122, 44, 0.04);
    border-left: 2px solid var(--accent);
    border-radius: 2px;
    font-family: var(--body);
    font-size: 0.78rem;
    line-height: 1.85;
    color: #3a3a3a;
    animation: letterFade 0.6s cubic-bezier(0.16, 0.84, 0.44, 1);
    cursor: pointer;
    transition: background 0.25s ease;
  }
  .letter-block:hover { background: rgba(160, 122, 44, 0.07); }
  .letter-block.collapsed { padding: 0.75rem 1rem; }
  .letter-block.collapsed h2 { margin: 0; font-size: 0.85rem; letter-spacing: 0.06em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .letter-block.collapsed h2::after {
    content: " ▸";
    font-size: 0.75rem;
    opacity: 0.6;
  }
  .letter-block.expanded h2::after {
    content: " ▾";
    font-size: 0.75rem;
    opacity: 0.6;
  }
  .letter-block .letter-body { display: none; }
  .letter-block.expanded .letter-body { display: block; margin-top: 1rem; }
  @keyframes letterFade {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .letter-block h2 {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 1rem;
  }
  .letter-block p { margin: 0 0 0.85rem; }
  .letter-block p:last-child { margin-bottom: 0; }
  .letter-block .signoff {
    margin-top: 1.2rem;
    font-style: italic;
    color: var(--muted);
    font-size: 0.72rem;
  }

  /* ===== ENTRY CLICK-TO-EXPAND ===== */
  /* Every entry is a click target. Single-expand: clicking opens this entry
     and closes any other open entry. Click again to collapse. */
  .entry {
    cursor: pointer;
    padding: 0.4rem 0.6rem;
    margin: 0 -0.6rem;
    border-radius: 3px;
    transition: background 0.25s ease;
    position: relative;
  }
  .entry:hover {
    background: rgba(160, 122, 44, 0.04);
  }
  .entry.open {
    background: rgba(160, 122, 44, 0.07);
    padding-bottom: 0.6rem;
  }
  .entry.open::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.6rem;
    bottom: 0.6rem;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
  }
  /* Hide all the inline hover affordances since the whole entry is clickable */
  .entry .row { user-select: none; }
  .entry.open .row { user-select: auto; }

  /* Quiet filter marker, when a filter is active, matched entries get a
     subtle accent dot enhancement, unmatched entries do nothing.
     No font scaling, no fading, no compressing. */
  body.filtered .entry.match .dot {
    box-shadow: 0 0 0 3px rgba(160, 122, 44, 0.15);
  }
  body.filtered .cv-section.has-match .section-head {
    color: var(--accent);
  }
  /* No more dimming, no more growing. Filter just marks. */

  /* ===== SECTIONS / ENTRIES ===== */
  section.cv-section { margin-bottom: 1.75rem; }
  .section-head {
    font-family: var(--serif);
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    padding-bottom: 0.4rem;
    border-bottom: 0.5px solid var(--accent-line);
    margin-bottom: 0.75rem;
  }
  .entry { margin-bottom: 0.5rem; }
  .entry .row {
    display: flex;
    gap: 0.75rem;
    align-items: baseline;
    line-height: 1.65;
  }
  .entry .date {
    font-family: var(--body);
    font-size: 0.68rem;
    color: var(--muted);
    min-width: 110px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .entry .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 0.35rem;
  }
  .entry .dot.cert { border-radius: 1px; transform: rotate(45deg); }
  .entry .body-col { flex: 1; min-width: 0; }
  .entry .title {
    font-family: var(--body);
    font-size: 0.78rem;
    font-weight: 700;
  }
  .entry .title.cert {
    font-size: 0.74rem;
    font-weight: 600;
    font-variant: small-caps;
    letter-spacing: 0.04em;
  }
  .entry .note {
    font-family: var(--body);
    font-size: 0.7rem;
    font-style: italic;
    color: var(--muted);
  }
  .entry .desc {
    margin-left: 128px;
    margin-top: 4px;
    padding: 0.5rem 0.75rem;
    background: rgba(160, 122, 44, 0.05);
    border-left: 2px solid var(--accent-line);
    border-radius: 2px;
    font-family: var(--body);
    font-size: 0.68rem;
    color: #5a5a52;
    line-height: 1.7;
  }
  .entry .link-row {
    margin-left: 128px;
    margin-top: 4px;
    padding: 0.3rem 0.75rem;
    background: rgba(160, 122, 44, 0.03);
    border-left: 2px solid rgba(160, 122, 44, 0.15);
    border-radius: 2px;
  }
  .entry .link-row a {
    font-family: var(--body);
    font-size: 0.63rem;
    color: var(--muted);
    letter-spacing: 0.02em;
    text-decoration: none;
    opacity: 0.8;
  }
  .entry .link-row a:hover { color: var(--accent); opacity: 1; }

  /* ===== FOOTER SECTIONS ===== */
  .credentials-block {
    border-top: 0.5px solid var(--accent-line);
    padding-top: 1.25rem;
    margin-top: 1rem;
  }
  .credentials-head {
    font-family: var(--serif);
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }
  .credentials-body {
    font-family: var(--body);
    font-size: 0.72rem;
    color: #5a5a52;
    line-height: 1.8;
  }
  .edu-line { margin-bottom: 0.15em; }
  .edu-line:last-child { margin-bottom: 0; }

  footer.cv-footer {
    text-align: center;
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 0.5px solid var(--accent-line);
  }
  footer.cv-footer .colophon {
    font-family: var(--serif);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    position: fixed;
    bottom: 1.2rem;
    right: 1.5rem;
    z-index: 100;
    font-family: var(--sans);
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg);
    opacity: 0.35;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0.4rem 0.6rem;
    transition: opacity 0.3s ease, color 0.3s ease;
  }
  .mode-toggle:hover { opacity: 0.85; color: var(--accent); }
  body.party .mode-toggle { opacity: 0.55; }

  /* ===== RTL SUPPORT ===== */
  body.rtl .langs { direction: ltr; }
  body.rtl .filter-nav { direction: ltr; }
  body.rtl .actions { direction: ltr; }
  body.rtl .entry .row { flex-direction: row-reverse; }
  body.rtl .entry .date { text-align: left; }
  body.rtl .entry .body-col { text-align: right; direction: rtl; }
  body.rtl .entry .desc, body.rtl .entry .link-row {
    margin-left: 0;
    margin-right: 128px;
    border-left: none;
    border-right: 2px solid var(--accent-line);
    text-align: right;
    direction: rtl;
  }
  body.rtl .section-head, body.rtl .credentials-head { text-align: right; direction: rtl; }
  body.rtl .credentials-body { direction: rtl; text-align: right; }

  /* ===== PRINT ===== */
  /* @page: tightened margins from 0.55in to 0.5in. Letter size. No browser
     header/footer artifacts. Named page for first-page header reservation. */
  @page { margin: 0.5in 0.55in; size: letter; }
  @page :first { margin-top: 0.5in; }
  @media print {
    /* Clean white background. Subtle warmth in ink color.
       FORCE zero padding/margin on .page to eliminate top whitespace band
       that screen .page padding (6rem) was causing in print output. */
    html, body { background: #ffffff !important; }
    body {
      background: #ffffff !important;
      color: #1a1a1a !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 0 !important;
      margin: 0 !important;
      font-size: 10.5pt;
    }
    main.page, .page {
      padding: 0 !important;
      margin: 0 !important;
      max-width: 100% !important;
    }
    /* Hide all chrome and screen-only affordances */
    .filter-nav, .actions, .langs, .fz-controls, .mode-toggle, .geo, #shareBtn, #saveBtn { display: none !important; }
    #letterBlock, .letter-block, .letter-stack { display: none !important; }
    body::before, body::after { display: none !important; }
    #pdfSubtitle.has-text { display: block !important; }

    /* CV header: tighter, hierarchy preserved, footer-running-name added below.
       Burgundy aesthetic to match site identity at seminarschools.com. */
    header.cv-header {
      margin-bottom: 0.55rem;
      padding-bottom: 0.4rem;
      padding-top: 0;
      border-bottom: 1px solid #7A2632;
      page-break-after: avoid;
      text-align: center;
    }
    header.cv-header h1 {
      font-size: 1.6rem;

<p>The classroom techniques are anchored in concrete formats. In IB Theory of Knowledge a unit runs as Claims-Counterclaims-Implications mapped onto case studies, with retrieval-based review built into the rhythm so earlier cases stay live as new ones arrive. In OSSD Civics, role-played municipal council debates grounded in current Toronto policy give students a structure to hold contested positions without collapsing into opinion-trading. In A-level literature with second-language learners, shared annotation and oral rehearsal of arguments precede independent prose, with sentence stems that release as the form is internalized. Across all of it, assessment rewards how thinking develops across revision cycles rather than a single performance under pressure. Spaced practice, interleaving, and chunking to manage cognitive load are how the room is built, not what gets named in it.</p>

<p>我最坚持的是课堂的结构样貌。学校是一个让人们通过在公开场合发言、提问与修正，直到分歧揭示出任何一方未曾单独带入的事物，从而发展出自身主体性的场所。能产生这种状态的课堂并非以单一权威为核心。它以一个有准备的群体围绕一个共同问题运作，教师则是其中一位有准备的思考者。我理想中的课堂前方站着三位各有不同强项的教师，因为没有任何单一个人能示范足够多元的思考模式，让学生看见真实的分歧；而看见真实的分歧，正是告诉学生他们被允许为自己思考的事物。</p>
<p>我曾在六个国家、横跨十五种课纲中任教，并通过 OSSD、IB、AP、A-Level、ESL 与成人教育与一千多名学生共同工作。框架随情境调整，结构始终一致。</p>`,
      fa: `<p>من هر کلاس را به‌عنوان یک سمینار در حال اجرا اداره می‌کنم. دانش‌آموزان با خوانده‌های قبلی وارد می‌شوند. جلسه در میان ادعاها، ادعاهای متقابل و پیامدها پیش می‌رود، نه از طریق سخنرانی و یادداشت‌برداری. نقش من میزبانی پرسش‌گری است، نه ارائهٔ نتیجه‌گیری. تعهد ساختاری این است که خوانندگانی که آماده شده‌اند و با هم روی یک متن دشوار کار می‌کنند، به فهمی دست می‌یابند که هیچ فردی به‌تنهایی به آن نمی‌رسد، و این دشواری زایا همان چیزی است که یادگیری ماندگار را تولید می‌کند.</p>
<p>تکنیک‌های کلاس در قالب‌های مشخص لنگر می‌اندازند. در IB نظریهٔ دانش، یک واحد به صورت نقشه‌برداری «ادعا-ادعای متقابل-پیامد» بر مطالعات موردی پیش می‌رود، با مرور بازیابی‌محور تعبیه‌شده در ریتم، تا موارد قبلی هنگام رسیدن موارد جدید زنده بمانند. در OSSD شهروندی، مناظرات نقش‌بازی‌شدهٔ شورای شهرداری که در سیاست‌های جاری تورنتو ریشه دارند، به دانش‌آموزان ساختاری می‌دهند که موضع‌های مورد مناقشه را بدون فروپاشی به تبادل عقیده در دست نگه دارند. در ادبیات A-Level با زبان‌آموزان دوم، حاشیه‌نویسی مشترک و تمرین شفاهی استدلال‌ها بر نثر مستقل مقدم است، و الگوهای جمله با درونی‌شدن شکل تازه به‌تدریج رها می‌شوند. در سراسر این‌ها، ارزشیابی رشد تفکر در چرخه‌های بازنویسی را پاداش می‌دهد، نه یک عملکرد منفرد زیر فشار. تمرین فاصله‌دار، درهم‌آمیختگی، و تکه‌بندی برای مدیریت بار شناختی، شیوهٔ ساخته شدن اتاق‌اند، نه نام‌هایی که در آن گفته می‌شوند.</p>
<p>آنچه بیش از همه به آن متعهدم، شکل ساختاری اتاق است. مدرسه جایی است که انسان‌ها از طریق سخن‌گفتن، پرسش، و بازنویسی در ملأ عام تا زمانی که اختلاف چیزی را آشکار کند که هیچ‌یک به‌تنهایی نیاورده است، سوبژکتیویتهٔ خود را پرورش می‌دهند. کلاسی که این را تولید می‌کند پیرامون یک اقتدار واحد ساخته نشده. پیرامون اجتماعی آماده ساخته شده که روی مسئله‌ای مشترک کار می‌کند و معلم یکی از ذهن‌های آماده در میان دیگران است. کلاس آرمانی من سه معلم با توانایی‌های متفاوت در جلوی خود دارد، زیرا هیچ فرد تنها نمی‌تواند به اندازهٔ کافی شیوه‌های تفکر را الگوسازی کند تا دانش‌آموزان اختلاف واقعی را ببینند؛ و دیدن اختلاف واقعی همان چیزی است که به دانش‌آموزان می‌گوید مجازند برای خود فکر کنند.</p>
<p>من در شش کشور و در پانزده برنامهٔ درسی تدریس کرده‌ام و با بیش از هزار دانش‌آموز در OSSD، IB، AP، A-Level، ESL و آموزش بزرگسالان کار کرده‌ام. چارچوب تطبیق می‌یابد. معماری ثابت می‌ماند.</p>`,
      fr: `<p>J'enseigne en menant chaque classe comme un séminaire en activité. Les étudiants arrivent ayant lu. La séance avance par revendications, contre-revendications et implications, plutôt que par cours magistral et prise de notes. Mon rôle est d'accueillir l'enquête, non de livrer la conclusion. L'engagement structurel est qu'un groupe de lecteurs préparés qui travaillent ensemble sur un texte difficile atteint une compréhension qu'aucun individu n'aurait pu atteindre seul, et que cette difficulté générative est précisément ce qui produit un apprentissage durable.</p>
<p>Les techniques de classe sont ancrées dans des formats concrets. En IB Théorie de la connaissance, une unité se déroule sous forme de Revendications-Contre-revendications-Implications appliquées à des études de cas, avec une révision par rappel intégrée au rythme afin que les cas antérieurs restent vivants à mesure que de nouveaux arrivent. En OSSD Civisme, des débats joués de conseil municipal ancrés dans les politiques actuelles de Toronto donnent aux élèves une structure pour tenir des positions contestées sans s'effondrer dans l'échange d'opinions. En littérature A-Level avec des apprenants de seconde langue, l'annotation partagée et la répétition orale des arguments précèdent la prose autonome, avec des amorces de phrases qui se retirent à mesure que la forme s'intériorise. Dans tout cela, l'évaluation récompense la manière dont la pensée se développe à travers des cycles de révision plutôt qu'une performance unique sous pression. Pratique espacée, entrelacement et fragmentation pour gérer la charge cognitive sont la manière dont la salle est construite, non ce qui y est nommé.</p>
<p>Ce à quoi je tiens le plus est la forme structurelle de la salle. Une école est un lieu où les personnes développent leur propre subjectivité en parlant, en questionnant et en révisant en public jusqu'à ce que le désaccord révèle quelque chose qu'aucun participant n'avait apporté seul. La classe qui produit cela n'est pas construite autour d'une autorité unique. Elle est construite autour d'une communauté préparée travaillant sur un problème partagé, avec l'enseignant comme un esprit préparé parmi d'autres. Ma classe idéale comporte trois enseignants aux forces différentes devant elle, parce qu'aucune personne seule ne peut modéliser assez de modes de pensée pour que les élèves voient un désaccord réel se dérouler, et voir un désaccord réel est ce qui dit aux élèves qu'ils ont le droit de penser par eux-mêmes.</p>
<p>J'ai enseigné dans six pays à travers quinze curricula et travaillé avec plus de mille étudiants dans le cadre de OSSD, IB, AP, A-Level, ESL et éducation des adultes. Le cadre s'adapte. L'architecture reste la même.</p>`
    }
  },
  kitchen: {
    title: { en: "On kitchen work", zh: "論廚房工作", zhs: "论厨房工作", fa: "درباره کار آشپزخانه", fr: "Sur la cuisine" },
    body: {
      en: `<p>Working kitchens since sixteen. Pizza Pizza through high school and university, front-of-house and line work across Mile End venues in Montreal, ship's chef on the Hawila gaff-rigged ketch, private winery estate near Florence, volunteer cook for Floating City in Copenhagen. Service runs because prep was done correctly hours earlier. The kitchen that fails at six failed at two. I read mise en place as a discipline of working backwards from a moment of pressure to the conditions that make pressure survivable. The same discipline shows up in how I prepare a classroom and how I plan a community event.</p>`,
      zh: `<p>十六歲起便在廚房工作。高中與大學期間任職於 Pizza Pizza，蒙特婁 Mile End 區多家場館的前場與線上廚房工作，丹麥斜桁雙桅帆船 Hawila 上的船上主廚，佛羅倫斯郊外的私人酒莊，哥本哈根 Floating City 的志工廚師。服務之所以順暢，是因為數小時前的備料就已正確完成。六點崩潰的廚房，是在兩點就已經崩潰。我把 mise en place 視為一種紀律：從受壓的那一刻向回推導，建立讓壓力得以承受的條件。同樣的紀律，也展現在我準備課室與規劃社區活動的方式之中。</p>`,
      zhs: `<p>十六岁起便在厨房工作。高中与大学期间任职于 Pizza Pizza，蒙特利尔 Mile End 区多家场馆的前场与线上厨房工作，丹麦斜桁双桅帆船 Hawila 上的船上主厨，佛罗伦萨郊外的私人酒庄，哥本哈根 Floating City 的志愿厨师。服务之所以顺畅，是因为数小时前的备料就已正确完成。六点崩溃的厨房，是在两点就已经崩溃。我把 mise en place 视为一种纪律：从受压的那一刻向回推导，建立让压力得以承受的条件。同样的纪律，也展现在我准备课堂与规划社区活动的方式之中。</p>`,
      fa: `<p>از شانزده‌سالگی در آشپزخانه‌ها کار کرده‌ام. Pizza Pizza در دوران دبیرستان و دانشگاه، کار پذیرایی و خط آشپزخانه در مکان‌های محلهٔ Mile End مونترال، سرآشپز کشتی Hawila، ملک خصوصی شراب‌سازی در حومهٔ فلورانس، آشپز داوطلب برای Floating City در کپنهاگ. سرویس روان پیش می‌رود چون آماده‌سازی ساعت‌ها پیش به‌درستی انجام شده است. آشپزخانه‌ای که ساعت شش شکست می‌خورد، ساعت دو شکست خورده است. من mise en place را به‌عنوان نظمی می‌خوانم که از لحظهٔ فشار به عقب کار می‌کند تا شرایطی بسازد که فشار را قابل‌تحمل کند. همین نظم در شیوهٔ آماده کردن کلاس و برنامه‌ریزی رویداد جامعه نیز پیدا می‌شود.</p>`,
      fr: `<p>En cuisine depuis seize ans. Pizza Pizza au secondaire et à l'université, service en salle et travail à la chaîne dans des lieux du Mile End à Montréal, chef de bord sur le ketch à corne Hawila, domaine viticole privé près de Florence, cuisinier bénévole pour Floating City à Copenhague. Le service tient parce que la mise en place a été faite correctement plusieurs heures plus tôt. La cuisine qui échoue à dix-huit heures avait déjà échoué à quatorze. Je lis la mise en place comme une discipline qui travaille à rebours depuis un moment de pression vers les conditions qui rendent la pression supportable. La même discipline apparaît dans la façon dont je prépare une salle de classe et planifie un événement communautaire.</p>`
    }
  },
  community: {
    title: { en: "On community work", zh: "論社區工作", zhs: "论社区工作", fa: "درباره کار اجتماعی", fr: "Sur le travail communautaire" },
    body: {
      en: `<p>The thread across my community work is that the system that runs at the moment of pressure was designed long before the pressure arrived. Volunteer retention happens months before a market day. Logistics on a refugee corridor depend on relationship infrastructure built over the previous year and a half. A fifteen-hundred-delegate conference resolves on the floor only if the briefings and chair training were finished weeks earlier. The work that holds is the work nobody sees on the day.</p>`,
      zh: `<p>貫穿我社區工作的主線是：在壓力到來的那一刻仍能運作的系統，早在壓力來臨之前便已被設計妥當。志工的留任在市集日之前數個月便已展開。難民走廊上的後勤運作，依賴於前一年半建立起的關係基礎建設。一場一千五百人規模的會議能在現場順利推進，靠的是數週前完成的簡報與主持人培訓。真正能撐住的工作，是當天無人看見的那部分。</p>`,
      zhs: `<p>贯穿我社区工作的主线是：在压力到来的那一刻仍能运作的系统，早在压力来临之前便已被设计妥当。志愿者的留任在市集日之前数月便已展开。难民走廊上的后勤运作，依赖于前一年半建立起的关系基础建设。一场一千五百人规模的会议能在现场顺利推进，靠的是数周前完成的简报与主持人培训。真正能撑住的工作，是当天无人看见的那部分。</p>`,
      fa: `<p>رشتهٔ مشترک کار اجتماعی من این است که سیستمی که در لحظهٔ فشار کار می‌کند، خیلی پیش از رسیدن فشار طراحی شده. ماندگاری داوطلبان ماه‌ها پیش از روز بازار شکل می‌گیرد. لجستیک یک راهرو پناهندگی به زیرساخت رابطه‌ای متکی است که در یک سال و نیم قبل ساخته شده. یک کنفرانس با هزار و پانصد نماینده تنها وقتی روی صحنه به نتیجه می‌رسد که جلسات توجیهی و آموزش مدیران جلسه هفته‌ها پیش پایان یافته باشد. کاری که دوام می‌آورد، همان کاری است که در آن روز هیچ‌کس نمی‌بیند.</p>`,
      fr: `<p>Le fil de mon travail communautaire est que le système qui tient au moment de la pression a été conçu bien avant l'arrivée de la pression. La fidélisation des bénévoles se fait des mois avant un jour de marché. La logistique sur un corridor de réfugiés dépend d'une infrastructure relationnelle construite au cours de l'année et demie précédente. Une conférence de mille cinq cents délégués se résout sur place seulement si les briefings et la formation des présidents de séance ont été terminés des semaines plus tôt. Le travail qui tient est le travail que personne ne voit le jour même.</p>`
    }
  },
  education: {
    title: { en: "On education and study", zh: "論教育與研究", zhs: "论教育与研究", fa: "درباره آموزش و پژوهش", fr: "Sur l'éducation et l'étude" },
    body: {
      en: `<p>The study practice I work from is sustained attention to a text, in company with other prepared readers, until something neither participant brought in alone reveals itself. My MA thesis "Carrying Over the Burdens of Trace" applies this to ritual studies through Confucianism, asking how civic ritual carries meaning across a rupture in tradition. Ongoing PhD work in education research extends the same practice into pedagogy. The connecting claim is that real learning is dialogical and ritual, not transmission and credential.</p>`,
      zh: `<p>我所依循的研讀實踐是：對一篇文本持續投以注意，與其他有準備的讀者一同停留，直到任何一方都未曾單獨帶入的事物自行顯現。我的碩士論文〈Carrying Over the Burdens of Trace〉將此實踐應用於儀式研究與儒學的交會處，探問公共儀式如何在傳統斷裂之中承載意義。我目前進行中的教育學博士研究將同樣的實踐延伸至教學法。貫穿其中的主張是：真正的學習是對話的、是儀式性的，而非資訊傳遞與憑證取得。</p>`,
      zhs: `<p>我所依循的研读实践是：对一篇文本持续投以注意，与其他有准备的读者一同停留，直到任何一方都未曾单独带入的事物自行显现。我的硕士论文《Carrying Over the Burdens of Trace》将此实践应用于仪式研究与儒学的交会处，探问公共仪式如何在传统断裂之中承载意义。我目前进行中的教育学博士研究将同样的实践延伸至教学法。贯穿其中的主张是：真正的学习是对话的、是仪式性的，而非信息传递与资格证取得。</p>`,
      fa: `<p>شیوهٔ مطالعه‌ای که از آن کار می‌کنم، توجه پایدار به یک متن است، در همراهی با خوانندگان آماده، تا زمانی که چیزی آشکار شود که هیچ‌یک به‌تنهایی نیاورده است. پایان‌نامهٔ کارشناسی ارشد من با عنوان «Carrying Over the Burdens of Trace» این شیوه را بر مطالعات آیینی از منظر کنفوسیوسی به کار می‌بندد، و می‌پرسد چگونه آیین مدنی معنا را در میان گسست سنت حمل می‌کند. کار جاری دکترای من در پژوهش آموزشی همین شیوه را به آموزش‌شناسی گسترش می‌دهد. ادعای پیونددهنده این است که یادگیری واقعی گفت‌وگویی و آیینی است، نه انتقال و اعتبارنامه.</p>`,
      fr: `<p>La pratique d'étude à partir de laquelle je travaille est l'attention soutenue à un texte, en compagnie d'autres lecteurs préparés, jusqu'à ce que quelque chose qu'aucun n'avait apporté seul se révèle. Mon mémoire de MA « Carrying Over the Burdens of Trace » applique cette pratique aux études rituelles à travers le confucianisme, demandant comment le rituel civique porte du sens à travers une rupture dans la tradition. Le travail doctoral en cours en recherche éducative étend la même pratique à la pédagogie. La thèse qui les relie est que l'apprentissage réel est dialogique et rituel, et non transmission et accréditation.</p>`
    }
  },
  volunteer: {
    title: { en: "On volunteer work", zh: "論志工服務", zhs: "论志愿服务", fa: "درباره کار داوطلبانه", fr: "Sur le bénévolat" },
    body: {
      en: `<p>Volunteer work has been continuous across my life. CNIB Night Steps as a sighted guide. English-language teaching at a learning centre in Egypt. Eight years of periodic farm work through WWOOF. Long-term care visits at Carefree Lodge across four summers in high school. The thread is the obligation to keep showing up in unpaid contexts, because what holds a community together is the work that no one is paying for.</p>`,
      zh: `<p>志工服務在我生命中是持續的。在 CNIB Night Steps 擔任明眼嚮導；於埃及的英語學習中心任教；透過 WWOOF 進行為期八年的不定期農場工作；高中四個暑假於 Carefree Lodge 從事長期照護的訪視工作。貫穿其中的線索是：在無報酬的情境中持續出現的義務。維繫一個社區的，是無人為之付酬的那部分工作。</p>`,
      zhs: `<p>志愿服务在我生命中是持续的。在 CNIB Night Steps 担任明眼向导；于埃及的英语学习中心任教；通过 WWOOF 进行为期八年的不定期农场工作；高中四个暑假于 Carefree Lodge 从事长期照护的访视工作。贯穿其中的线索是：在无报酬的情境中持续出现的义务。维系一个社区的，是无人为之付酬的那部分工作。</p>`,
      fa: `<p>کار داوطلبانه در زندگی من پیوسته بوده. راهنمای بینا در CNIB Night Steps. تدریس زبان انگلیسی در یک مرکز آموزشی در مصر. هشت سال کار دوره‌ای در مزارع از طریق WWOOF. بازدیدهای مراقبت بلندمدت در Carefree Lodge طی چهار تابستان دوران دبیرستان. رشتهٔ پیونددهنده، تعهد به حضور پیوسته در زمینه‌های بی‌مزد است، زیرا آنچه یک جامعه را کنار هم نگه می‌دارد، همان کاری است که هیچ‌کس برایش پولی پرداخت نمی‌کند.</p>`,
      fr: `<p>Le bénévolat a été continu dans ma vie. CNIB Night Steps comme guide voyant. Enseignement de l'anglais dans un centre d'apprentissage en Égypte. Huit ans de travail agricole périodique via WWOOF. Visites en soins de longue durée à Carefree Lodge sur quatre étés du secondaire. Le fil est l'obligation de continuer à se présenter dans des contextes non rémunérés, car ce qui tient une communauté ensemble est le travail que personne ne paie.</p>`
    }
  },
  performance: {
    title: { en: "On performance", zh: "論表演", zhs: "论表演", fa: "درباره اجرا", fr: "Sur la performance" },
    body: {
      en: `<p>I treat performance and teaching as continuous practices because both depend on holding attention, calibrating to a room, and trusting that what comes through unrehearsed is sometimes more honest than what was prepared. The training started with the Sears Ontario Drama Festival years at Claude Watson and continued through commercial work for Street Kids International produced through the Screen Arts curriculum.</p>`,
      zh: `<p>我把表演與教學視為連續的實踐，因為兩者都依賴於持守注意力、依現場校準，並信任那些未經排練之物有時比預先準備的更為誠實。訓練始於 Claude Watson 期間參與 Sears 安大略戲劇節，並透過 Screen Arts 課程延伸至為 Street Kids International 拍攝的公益影像作品。</p>`,
      zhs: `<p>我把表演与教学视为连续的实践，因为两者都依赖于持守注意力、依现场校准，并信任那些未经排练之物有时比预先准备的更为诚实。训练始于 Claude Watson 期间参与 Sears 安大略戏剧节，并通过 Screen Arts 课程延伸至为 Street Kids International 拍摄的公益影像作品。</p>`,
      fa: `<p>من اجرا و تدریس را به‌عنوان دو تمرین پیوسته تلقی می‌کنم، زیرا هر دو به نگه‌داشتن توجه، تنظیم بر اساس فضا، و اعتماد به این بسته‌اند که آنچه از تمرین‌نشدگی بیرون می‌آید گاهی صادق‌تر از چیزی است که از پیش آماده شده. آموزش از سال‌های جشنوارهٔ تئاتر Sears انتاریو در Claude Watson آغاز شد و از طریق برنامهٔ Screen Arts به کار تبلیغاتی برای Street Kids International ادامه یافت.</p>`,
      fr: `<p>Je traite la performance et l'enseignement comme des pratiques continues parce que les deux dépendent de la tenue de l'attention, de l'ajustement à une salle, et de la confiance que ce qui passe sans répétition est parfois plus honnête que ce qui était préparé. La formation a commencé avec les années du Festival Sears de l'Ontario à Claude Watson et s'est poursuivie par le travail publicitaire pour Street Kids International produit dans le cadre du programme Arts de l'écran.</p>`
    }
  }
};

// Supported patterns (returns array of normalized category names):
//   /saul/kitchen                         → ["kitchen"]

//   ?cat=kitchen,teaching                 → ["kitchen","teaching"]   (query backward compat)
//   ?cat=kitchen                          → ["kitchen"]              (query backward compat)
//   #kitchen+teaching                     → ["kitchen","teaching"]   (hash backward compat)
// Invalid segments silently dropped. Case-insensitive. Trailing slashes ignored.
// Order independence achieved at parse time (any input order); URL serialization
// is alphabetically sorted for canonical form.
// ===========================================================================
function parseRoute() {
  const out = [];
  const seen = new Set();
  const add = (s) => {
    if (!s) return;
    const k = s.toLowerCase().trim();
    if (k && k in CATS && !seen.has(k)) { seen.add(k); out.push(k); }
  };

  // Path: /saul/<...> or /cv/<...> (any depth)
  const path = window.location.pathname;
  const pathMatch = path.match(/^\/(saul|cv)(?:\/(.*))?$/i);
  if (pathMatch && pathMatch[2]) {
    pathMatch[2].split('/').forEach(add);
  }

  // Query string fallback: ?cat=kitchen or ?cat=kitchen,teaching
  const search = new URLSearchParams(window.location.search);
  const qCat = search.get('cat');
  if (qCat) qCat.split(',').forEach(add);

  // Hash fallback: #kitchen or #kitchen+teaching
  const h = window.location.hash.slice(1);
  if (h) h.split(/[+,]/).forEach(add);

  return out;
}

// Language from URL: ?lang=zh / zhs / fa / fr. English is the unmarked default.
function parseLangFromUrl() {
  try {

  } catch (e) { return null; }
}

// Update browser URL to reflect current filter state without reloading.
// Categories serialized in alphabetical order for canonical, deterministic URLs.
function syncUrlToFilter() {

  const newPath = cats.length === 0 ? '/saul/' : '/saul/' + cats.join('/');

  if (lang && lang !== 'en') sp.push('lang=' + lang);

  const target = newPath + newSearch;

    try {
      window.history.replaceState({ cats, lang, mode: cvMode }, '', target);
    } catch (e) {
      // history.replaceState can fail in some sandboxed contexts; ignore silently
    }
  }
}

  [6,"c. 2018–2020",["community","performance","kitchen"],{en:"Event Security and Front-of-House; Special Events and Nightclub, Toronto",zh:"活動安保及前場服務；多倫多特別活動及夜店",zhs:"活动安保及前场服务；多伦多特别活动及夜店",fa:"امنیت رویداد و پذیرایی؛ رویدادهای ویژه و کلوب شبانه، تورنتو",fr:"Sécurité événementielle et service en salle ; événements spéciaux et boîte de nuit, Toronto"},{en:"Licensed",zh:"持牌",zhs:"持牌",fa:"دارای مجوز",fr:"Sous licence"},null,{en:"Two pre-pandemic years working private security at a downtown Toronto gay club and a rotating set of special events. Always the de-escalation role at the door, diplomatic conversation as the primary tool, physical intervention as the rare last resort. Ontario Security Guard License. Front-of-house and floor-management overlap kept the work close to hospitality rather than enforcement.",zh:"疫情前兩年於多倫多市中心一家同志夜店及多項特別活動擔任私人安保。一直擔任門口的緩和角色——以外交對話為主要工具，肢體介入則是極少使用的最後手段。安大略保安員執照。前場與場內管理職責的重疊使這份工作更接近餐旅服務而非執法。",zhs:"疫情前两年于多伦多市中心一家同志夜店及多项特别活动担任私人安保。一直担任门口的缓和角色——以外交对话为主要工具，肢体介入则是极少使用的最后手段。安大略保安员执照。前场与场内管理职责的重叠使这份工作更接近餐旅服务而非执法。",fa:"دو سال پیش از همه‌گیری، کار امنیتی خصوصی در یک کلوب همجنس‌گرایان در مرکز شهر تورنتو و مجموعه‌ای از رویدادهای ویژه. همیشه نقش آرام‌سازی در درگاه, گفت‌وگوی دیپلماتیک به‌عنوان ابزار اصلی، مداخلهٔ فیزیکی به‌عنوان آخرین گزینهٔ نادر. مجوز نگهبان امنیتی انتاریو. هم‌پوشانی با خدمات پذیرایی و مدیریت سالن، این کار را به مهمان‌نوازی نزدیک‌تر کرد تا اجرای قانون.",fr:"Deux années pré-pandémiques en sécurité privée dans une boîte de nuit gaie du centre-ville de Toronto et lors d'une rotation d'événements spéciaux. Toujours en rôle de désescalade à la porte, la conversation diplomatique comme outil principal, l'intervention physique comme rare dernier recours. Permis d'agent de sécurité de l'Ontario. Le chevauchement avec le service en salle et la gestion de plancher rapprochait le travail de l'hôtellerie plutôt que de l'application de la loi."}],

// ===========================================================================
let lang = "en";
let active = new Set();
let fz = 0;
let openEntryId = null;
let lettersExpanded = new Set();
// PERF caches: only recompute filter results when filter or language changes
let _lastGroupedKey = null;
let _lastGrouped = null;
let cvMode = "chrono"; // "chrono" = by career period, "theme" = grouped by category
const THEME_ORDER = ["teaching","education","seminarschools","community","performance","volunteer","kitchen"];
const CAT_LABELS = { teaching:"Teaching", education:"Education", seminarschools:"Seminar Schools", community:"Community", performance:"Performance", volunteer:"Volunteer", kitchen:"Culinary Hospitality" };

function isCert(item) {
  return tagsOf(item[2]).includes("education") && /Certif|Certificate|Bootcamp|Machine Learning A-Z|Practitioner|TESOL|Bronze Cross/.test(item[3].en);
}

function getText(obj, fallbackKey) {
  if (!obj) return null;
  if (typeof obj === "string") return obj;
  return obj[lang] || obj[fallbackKey] || obj.en;
}

// Fast-path: toggle a single entry without re-rendering the whole page.
// Closes any previously-open entry, opens the clicked one, updates state.
function toggleEntry(entryId, item, desc, url, domain, cert) {
  const wasOpen = openEntryId === entryId;

  // Close previously-open entry by class toggle and removing expanded children
  if (openEntryId) {
    const prev = document.querySelector(`[data-entry-id="${openEntryId}"]`);
    if (prev) {
      prev.classList.remove("open");
      const prevRow = prev.querySelector(".row");
      prev.innerHTML = "";
      if (prevRow) prev.appendChild(prevRow);
    }
  }

  if (wasOpen) {
    openEntryId = null;
    return;
  }

  // Open the clicked entry: add .open class, append desc and link rows
  const el = document.querySelector(`[data-entry-id="${entryId}"]`);
  if (!el) return;
  el.classList.add("open");
  if (desc) {
    const d = document.createElement("div");
    d.className = "desc";
    d.textContent = desc;
    el.appendChild(d);
  }
  if (url) {
    const l = document.createElement("div");
    l.className = "link-row";
    l.innerHTML = `<a href="${url}" target="_blank" rel="noopener noreferrer">${domain}</a>`;
    el.appendChild(l);
  }
  openEntryId = entryId;
}

// Fast-path: toggle a letter block expanded/collapsed without full re-render
function toggleLetter(cat) {
  const block = document.querySelector(`[data-letter-cat="${cat}"]`);
  if (!block) return;
  if (lettersExpanded.has(cat)) {
    lettersExpanded.delete(cat);
    block.classList.remove("expanded");
    block.classList.add("collapsed");
  } else {
    lettersExpanded.add(cat);
    block.classList.add("expanded");
    block.classList.remove("collapsed");
  }
}

// OPTIMIZATION 4: Tint guard, skip recompute when active set unchanged
let _lastTintKey = null;

// Compute and apply page tint based on active category colors.
// Mixes colors at low alpha so the page background subtly shifts.
function applyTint() {
  // Skip when active set hasn't changed since last apply
  const key = [...active].sort().join(",");
  if (key === _lastTintKey) return;
  _lastTintKey = key;
  if (active.size === 0) {
    document.documentElement.style.setProperty("--tint-overlay", "transparent");
    return;
  }
  // Average the RGB of all active category colors
  let r = 0, g = 0, b = 0, count = 0;
  for (const cat of active) {
    const hex = CATS[cat]?.color;
    if (!hex) continue;
    const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
    if (!m) continue;
    r += parseInt(m[1], 16);
    g += parseInt(m[2], 16);
    b += parseInt(m[3], 16);
    count++;
  }
  if (count === 0) {
    document.documentElement.style.setProperty("--tint-overlay", "transparent");
    return;
  }
  r = Math.round(r / count);
  g = Math.round(g / count);
  b = Math.round(b / count);
  // Apply at low alpha so it tints rather than dominates
  const alpha = 0.08;
  document.documentElement.style.setProperty(
    "--tint-overlay",
    `rgba(${r}, ${g}, ${b}, ${alpha})`
  );
}

function render() {
  applyTint();
  const t = UI[lang];
  const isRTL = LANGS[lang].dir === "rtl";
  document.body.classList.toggle("rtl", isRTL);
  document.documentElement.lang = lang;
  document.documentElement.dir = isRTL ? "rtl" : "ltr";

  // Filter buttons translation
  document.querySelectorAll("#filterNav button").forEach(btn => {
    const cat = btn.dataset.cat;
    if (cat === "all") btn.textContent = t.all;
    else btn.textContent = t.cats[cat];
    btn.classList.toggle("on", (cat === "all" && active.size === 0) || active.has(cat));
  });

  // Save button label
  document.getElementById("saveBtn").textContent = t.save;
  const mt = document.getElementById("modeToggle");
  mt.textContent = (cvMode === "theme") ? "⇄ Thematic" : "⇄ Chronological";
  mt.classList.toggle("on", cvMode === "theme");

  // PDF subtitle, populated with the localized button labels of currently active
  // category filters. Hidden on screen via CSS; visible only in print.
  // No filter active = empty subtitle, hidden in PDF.
  // Single filter = "Culinary Hospitality" (or "Teaching", "Community", etc.)
  // Multiple filters = "Culinary Hospitality, Teaching" (alphabetically sorted by category key)
  const subtitleEl = document.getElementById("pdfSubtitle");
  if (subtitleEl) {
    if (active.size === 0) {
      subtitleEl.textContent = "";
      subtitleEl.classList.remove("has-text");
    } else {
      // Per-category contextual subheading. Education has empty subheading because
      // the MA postnominal beside the name carries that slot instead.
      // Other categories show their role label (Educator, Coordinator, Chef, etc).
      const labels = [...active].sort()
        .map(cat => t.subheadings && t.subheadings[cat])
        .filter(label => label && label.length > 0);
      if (labels.length > 0) {
        subtitleEl.textContent = labels.join(" \u00b7 ");
        subtitleEl.classList.add("has-text");
      } else {
        subtitleEl.textContent = "";
        subtitleEl.classList.remove("has-text");
      }
    }
    
    // MA postnominal visibility: visible only when no filter active OR education is in active.
    // Other single-category filters hide the MA badge so each role surfaces clean.
    const maBadge = document.querySelector("header.cv-header h1 .post");
    if (maBadge) {
      const showMa = (active.size === 0) || active.has("education");
      maBadge.style.display = showMa ? "" : "none";
    }
  }

  // Filter logic, when filtered, show ALL entries but mark which match
  const isFiltered = active.size > 0;
  document.body.classList.toggle("filtered", isFiltered);

  // PERF: cache the grouped list. Only recompute when filter or language changed.
  // This skips the D.filter walk on entry-click renders (which don't change groups).
  const cacheKey = [...active].sort().join(",") + "|" + lang + "|" + cvMode;
  let grouped;
  if (cacheKey === _lastGroupedKey && _lastGrouped) {
    grouped = _lastGrouped;
  } else {
    if (cvMode === "theme") {
      grouped = THEME_ORDER.map(cat => ({
        cat,
        items: D.filter(x => (isFiltered ? tagMatches(active, x[2]) : !tagsOf(x[2]).includes("seminarschools")) && sectionCat(active, x[2]) === cat).sort((a, b) => b[0] - a[0])
      })).filter(g => g.items.length > 0);
    } else {
      grouped = [9,8,7,6,5,4,3,2,1,0].map(i => ({
        i,
        items: D.filter(x => x[0] === i && (isFiltered ? tagMatches(active, x[2]) : !x[2].includes("seminarschools")))
      })).filter(g => g.items.length > 0);
    }
    _lastGroupedKey = cacheKey;
    _lastGrouped = grouped;
  }

  // Render one letter for every active category that has letter content.
  // Each letter starts collapsed, only its title shows. Click any title to expand it.
  const letterEl = document.getElementById("letterBlock");
  const lettersToShow = [...active].filter(cat => LETTERS[cat]);
  if (lettersToShow.length > 0) {
    letterEl.style.display = "";
    letterEl.className = "letter-stack";
    letterEl.innerHTML = lettersToShow.map(cat => {
      const isExpanded = lettersExpanded.has(cat);
      const letterTitle = LETTERS[cat].title[lang] || LETTERS[cat].title.en;
      const letterBody = LETTERS[cat].body[lang] || LETTERS[cat].body.en;
      return `<div class="letter-block ${isExpanded ? "expanded" : "collapsed"}" data-letter-cat="${cat}">
        <h2>${letterTitle}</h2>
        <div class="letter-body">${letterBody}</div>
      </div>`;
    }).join("");
    // Wire up click handlers for each letter block (fast-path, no re-render)
    letterEl.querySelectorAll(".letter-block").forEach(block => {
      block.onclick = (ev) => {
        if (ev.target.tagName === "A") return;
        toggleLetter(block.dataset.letterCat);
      };
    });
  } else {
    letterEl.style.display = "none";
    lettersExpanded.clear();
  }

  // Render entries (built into fragment, swapped in once at end for single reflow)
  const entriesEl = document.getElementById("entries");
  const frag = document.createDocumentFragment();
  // Determine effective section label, with single-category override
  function getSectionLabel(gIdx) {
    if (active.size === 1) {
      const onlyCat = [...active][0];
      const override = SECS_OVERRIDE[lang]?.[onlyCat]?.[gIdx];
      if (override === null) return null; // hide this section entirely
      if (override !== undefined) return override;
    }
    return t.secs[gIdx];
  }

  grouped.forEach(g => {
    const label = (cvMode === "theme") ? (CAT_LABELS[g.cat] || g.cat) : getSectionLabel(g.i);
    if (label === null) return; // section explicitly hidden for this filter
    const sec = document.createElement("section");
    sec.className = "cv-section";
    const head = document.createElement("div");
    head.className = "section-head";
    head.textContent = label;
    sec.appendChild(head);

    // Build all entries as one HTML string, set in single innerHTML write.
    const entryData = []; // store for click handler attachment after innerHTML
    let secHtml = "";
    g.items.forEach((item, itemIdx) => {
      const cert = isCert(item);
      const title = getText(item[3], "en");
      const note = item[4] ? getText(item[4], "en") : null;
      const url = item[5];
      const desc = item[6] ? getText(item[6], "en") : null;
      const domain = url ? url.replace(/^https?:\/\//, "").replace(/\/.*$/, "") : null;
      const entryId = `e-${cvMode === "theme" ? g.cat : g.i}-${itemIdx}`;
      const isOpen = openEntryId === entryId;
      const dotColor = CATS[primaryTag(item[2])]?.color || "#999";
      const cls = "entry" + (isFiltered ? " match" : "") + (isOpen ? " open" : "");
      secHtml += `<div class="${cls}" data-entry-id="${entryId}">
        <div class="row">
          <div class="date">${item[1]}</div>
          <div class="dot${cert ? " cert" : ""}" style="background:${dotColor}"></div>
          <div class="body-col">
            <span class="title${cert ? " cert" : ""}">${(tagsOf(item[2]).includes("seminarschools") && url) ? `<a class="ss-prop" href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>` : title}</span>${note ? `<span class="note"> ${note}</span>` : ""}
          </div>
        </div>${desc && isOpen ? `<div class="desc">${desc}</div>` : ""}${url && isOpen ? `<div class="link-row"><a href="${url}" target="_blank" rel="noopener noreferrer">${domain}</a></div>` : ""}
      </div>`;
      entryData.push({ id: entryId, item, desc, url, domain, cert });
    });
    // Wrap entries in a container we can innerHTML once
    const entriesWrap = document.createElement("div");
    entriesWrap.innerHTML = secHtml;
    sec.appendChild(entriesWrap);
    // Attach click handlers using event delegation on the wrap (one listener instead of N)
    entriesWrap.addEventListener("click", (ev) => {
      if (ev.target.tagName === "A") return;
      const entryEl = ev.target.closest("[data-entry-id]");
      if (!entryEl) return;
      const id = entryEl.dataset.entryId;
      const data = entryData.find(d => d.id === id);
      if (data) toggleEntry(data.id, data.item, data.desc, data.url, data.domain, data.cert);
    });
    if (isFiltered) {
      sec.classList.add("has-match");
    }
    frag.appendChild(sec);
  });

  // Single DOM swap at the end, replace all entries in one reflow
  entriesEl.innerHTML = "";
  entriesEl.appendChild(frag);

  // Credentials sections, filter to category-relevant subsets when one filter active
  const certsBlock = document.getElementById("certsHead").parentElement;
  const eduBlock = document.getElementById("eduHead").parentElement;
  document.getElementById("certsHead").textContent = t.certs;
  document.getElementById("eduHead").textContent = t.edu;

  let certsContent = t.certL;
  let eduContent = t.eduL;
  let showCerts = true;
  let showEdu = true;

  if (active.size === 1) {
    const onlyCat = [...active][0];
    const credsRule = CREDS_OVERRIDE[lang]?.[onlyCat];
    if (credsRule) {
      if (credsRule.certs === null) showCerts = false;
      else if (credsRule.certs !== undefined) certsContent = credsRule.certs;

      if (credsRule.edu === null) showEdu = false;
      else if (credsRule.edu !== undefined) eduContent = credsRule.edu;
    }
  }

  certsBlock.style.display = showCerts ? "" : "none";
  eduBlock.style.display = showEdu ? "" : "none";
  document.getElementById("certsBody").textContent = certsContent;
  const eduEl = document.getElementById("eduBody");
  eduEl.innerHTML = "";
  String(eduContent).split(/\s*\u00b7\s*/).filter(Boolean).forEach(function(line, i, arr){
    const d = document.createElement("div");
    d.className = "edu-line";
    d.textContent = line.trim();
    eduEl.appendChild(d);
  });

  // Letter size is handled globally and persistently by /js/theme.js.
}

      } else {
        active.add(cat); // new category starts collapsed by default
      }
    }
    syncUrlToFilter();
    render();
  });
});

// PDF EXPORT, natural multi-page flow with clean print typography
// ===========================================================================
// Previous behavior: applyOnePageFitScale measured content height and applied
// zoom: 0.35-0.50 to force everything onto one page. For dense CVs this
// produced mis-paginated output (section labels stacked at top of page 2 with

// entries from CHINA/EUROPE/MCGILL/HIGH SCHOOL/ELEMENTARY spilling below
// the footer). Disabled May 24 2026 T115z. The print CSS now handles a
// clean 2-3 page layout with proper page breaks and running margins.
function applyOnePageFitScale() {
  // No-op. Print CSS controls layout. zoom-shrink logic produced
  // pagination chaos and is retired.
}

function clearOnePageFitScale() {
  document.documentElement.style.removeProperty("--print-scale");
  document.body.classList.remove("print-scaled");
}

window.addEventListener("beforeprint", applyOnePageFitScale);
window.addEventListener("afterprint", clearOnePageFitScale);

document.getElementById("saveBtn").addEventListener("click", () => {
  // Always build the PDF live from the data so it matches the on-screen CV in

  // /saul/cv.pdf that had drifted out of sync (PhDs listed under Current
  // Projects, stale role notes). buildPrintCv puts the PhDs in Education and
  // pulls every note from the current data.
  buildPrintCv();
  window.print();
});

document.getElementById("modeToggle").addEventListener("click", () => {

  render();

});

document.getElementById("shareBtn").addEventListener("click", () => {
  try {
    // Build canonical share URL: origin + /saul/<sorted cats joined by />
    const cats = [...active].sort();
    const path = cats.length === 0 ? '/saul/' : '/saul/' + cats.join('/');
    const sp = [];
    if (lang && lang !== 'en') sp.push('lang=' + lang);
    if (cvMode === 'theme') sp.push('mode=theme');
    const url = window.location.origin + path + (sp.length ? '?' + sp.join('&') : '');
    navigator.clipboard.writeText(url);
    const btn = document.getElementById("shareBtn");
    btn.textContent = "✓ Copied";
    btn.classList.add("copy-on");
    setTimeout(() => {
      btn.textContent = "⎘ Share Link";
      btn.classList.remove("copy-on");
    }, 2000);
  } catch (e) {}
});

// Letter size is wired by the shared /js/theme.js via [data-fz] hooks (persistent, global).

// URL routing: slash-stacked path, ?cat= query, or #hash all parsed by parseRoute
try {
  const routedCats = parseRoute();
  const routedLang = parseLangFromUrl();
  const routedMode = new URLSearchParams(window.location.search).get('mode');
  if (routedMode === 'theme') cvMode = 'theme';
  if (routedLang) {
    lang = routedLang;
    document.querySelectorAll('#langs button').forEach(x =>
      x.classList.toggle('active', x.dataset.lang === routedLang));
  }
  if ((routedCats && routedCats.length > 0) || routedLang || routedMode === 'theme') {
    if (routedCats && routedCats.length > 0) active = new Set(routedCats);
    // Normalize URL to canonical sorted slash-stacked form on load,
    // keeping the lang and mode params when active.
    syncUrlToFilter();
  }
} catch (e) {}

// Browser back/forward: re-parse URL and re-render
window.addEventListener("popstate", () => {
  try {
    const cats = parseRoute();
    active = new Set(cats);
    const l = parseLangFromUrl();
    lang = l || 'en';
    const m = new URLSearchParams(window.location.search).get('mode');
    cvMode = (m === 'theme') ? 'theme' : 'chrono';
    document.querySelectorAll('#langs button').forEach(x =>
      x.classList.toggle('active', x.dataset.lang === lang));
    render();
  } catch (e) {}
});

function buildGeo() {
  const SIZE = 1000;
  const cx = SIZE / 2, cy = SIZE / 2;
  let svg = `<svg aria-hidden="true" viewBox="-${cx} -${cy} ${SIZE} ${SIZE}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<g fill="none" stroke="currentColor" stroke-width="0.5">`;

  const R = 380;
  // Outer circle
  svg += `<circle cx="0" cy="0" r="${R}"/>`;

  // Six interior tangent circles
  const r1 = R / 3;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const d = R - r1;
    svg += `<circle cx="${(d * Math.cos(a)).toFixed(1)}" cy="${(d * Math.sin(a)).toFixed(1)}" r="${r1.toFixed(1)}"/>`;
  }

  // Central
  svg += `<circle cx="0" cy="0" r="${r1.toFixed(1)}"/>`;

  // Smaller satellites
  const r2 = r1 / 2.5;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 + Math.PI / 12;
    const d = R - r2 - 5;
    svg += `<circle cx="${(d * Math.cos(a)).toFixed(1)}" cy="${(d * Math.sin(a)).toFixed(1)}" r="${r2.toFixed(1)}"/>`;
  }

  // Inner ring
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + Math.PI / 6;
    const d = r1 * 0.85;
    svg += `<circle cx="${(d * Math.cos(a)).toFixed(1)}" cy="${(d * Math.sin(a)).toFixed(1)}" r="${(r2 * 0.7).toFixed(1)}"/>`;
  }

  svg += `</g></svg>`;
  document.getElementById("geoLayer").innerHTML = svg;
}

      fa: "بنیان‌گذار Seminar Schools، نهادی در تورنتو که بر سمینار به‌عنوان شکل بنیادی یادگیری جدی استوار است. ادارهٔ آکادمی لِیزو (Leizu Academy) برای آموزش خصوصی در برنامهٔ درسی انتاریو، دیپلم IB و پذیرش دانشگاه، در کنار چارچوب polymyth و بازی آموزشی bookwormburrows. پیوند میان عمل کلاسی و پژوهش در یادگیری گفت‌وگومحور.",
      fr: "Fondateur de Seminar Schools, une structure torontoise fondée sur le séminaire comme forme première d'un apprentissage sérieux. Dirige la Leizu Academy, qui prépare au curriculum de l'Ontario, au diplôme de l'IB et aux admissions universitaires, aux côtés du cadre polymyth et du jeu pédagogique bookwormburrows. Relie la pratique en classe à la recherche sur l'apprentissage dialogique."
    }
  };
  var COMPETENCIES = ["Resource Planning & Allocation","Consultation & Guidance Expertise","Policy & Procedure Development","Social & Economic Impact Assessment","Team Development & Leadership","Basic French, Farsi, & Mandarin","Key Performance Indicator (KPI) tracking & Continuous Process Improvement"];
  // Per-tab competency routing. With no filter the full list shows. Filtered, the
  // competency block becomes the union of the active tabs' lists in canonical order,
  // so a kitchen CV stops advertising policy and impact-assessment skills. Order and

  var COMP_BY_CAT = {
    teaching: ["Consultation & Guidance Expertise","Basic French, Farsi, & Mandarin"],
    education: ["Consultation & Guidance Expertise","Policy & Procedure Development","Basic French, Farsi, & Mandarin"],

  };

  var COMPETENCIES_L10N = {

    zhs: ["资源规划与分配","咨询与辅导专长","政策与流程制定","社会与经济影响评估","团队培养与领导","基础法语、波斯语及普通话","关键绩效指标（KPI）追踪与持续流程改善"],
    fa: ["برنامه‌ریزی و تخصیص منابع","تخصص مشاوره و راهنمایی","تدوین سیاست و رویه","ارزیابی اثر اجتماعی و اقتصادی","توسعهٔ تیم و رهبری","فرانسه، فارسی و ماندارین مقدماتی","پایش شاخص‌های کلیدی عملکرد (KPI) و بهبود مستمر فرایند"],
    fr: ["Planification et allocation des ressources","Expertise en consultation et orientation","Élaboration de politiques et de procédures","Évaluation de l'impact social et économique","Développement d'équipe et leadership","Français, persan et mandarin de base","Suivi des indicateurs clés de performance (KPI) et amélioration continue des processus"]
  };

  var esc = function (s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var dateDigits = function (s) { return lang === 'fa' ? String(s).replace(/[0-9]/g, function (d) { return '۰۱۲۳۴۵۶۷۸۹'.charAt(+d); }) : s; };
  var firstSentence = function (txt) {

  };
  var tagsOf = function (c) { return Array.isArray(c) ? c : [c]; };
  var longest = D.reduce(function(a,e){ return Math.max(a, String(e[1]).length); }, 0);

    var note = noteRaw ? esc(noteRaw) : null;

  };

  var secs = '';
  if (cvMode === "theme") {
    THEME_ORDER.forEach(function(cat){
      var items = D.filter(function(x){ return sectionCat(active, x[2])===cat && x[0]>=1 && !tagsOf(x[2]).includes('seminarschools') && !isCert(x) && (!isFiltered || tagMatches(active, x[2])); }).sort(function(a,b){ return b[0]-a[0]; });
      if (!items.length) return;
      var secName = esc(CAT_LABELS[cat] || cat);
      secs += '<div class="sec block"><div class="sh">'+secName+'</div><table class="rows">'+items.map(rowHtml).join('')+'</table></div>';
    });
  } else {
    for (var i=9; i>=1; i--) {
      var items = D.filter(function(x){ return x[0]===i && !tagsOf(x[2]).includes('seminarschools') && !isCert(x) && (!isFiltered || tagMatches(active, x[2])); });
      if (!items.length) continue;
      var secName = esc((t.secs||UI.en.secs)[i] || UI.en.secs[i]);
      secs += '<div class="sec block"><div class="sh">'+secName+'</div><table class="rows">'+items.map(rowHtml).join('')+'</table></div>';
    }
  }

  // Credentials follow the same per-tab anchoring as the on-screen CV
  // (CREDS_OVERRIDE). Single tab: that tab's rule, where certs:null or
  // edu:null removes the section. Multiple tabs: the union of each selected
  // tab's certs in canonical order; education shows unless every selected
  // tab suppresses it. No filter: full lists. This is what keeps a kitchen
  // CV from carrying machine-learning bootcamps.
  var splitCreds = function (s) { return String(s||'').split(/\s*[\u00b7\u3001]\s*/).filter(Boolean); };
  var ovr = CREDS_OVERRIDE[lang] || CREDS_OVERRIDE.en || {};
  var fullCerts = splitCreds(t.certL||UI.en.certL);
  var certItems, showPrintEdu = true;
  if (!isFiltered) {
    certItems = fullCerts;
  } else {
    var allowed = {};
    var anyFull = false, anyEdu = false;
    active.forEach(function (cat) {
      var rule = ovr[cat];
      if (!rule) { anyFull = true; anyEdu = true; return; }     // no rule = full lists
      if (rule.certs === null) { /* contributes nothing */ }
      else if (rule.certs === undefined) { anyFull = true; }
      else splitCreds(rule.certs).forEach(function (c) { allowed[c] = 1; });
      if (rule.edu !== null) anyEdu = true;
    });
    certItems = anyFull ? fullCerts : fullCerts.filter(function (c) { return allowed[c]; });
    // Items present in a rule but phrased differently than certL still show:
    Object.keys(allowed).forEach(function (c) {
      if (certItems.indexOf(c) === -1 && fullCerts.indexOf(c) === -1) certItems.push(c);
    });
    showPrintEdu = anyEdu;
  }
  var showPrintCerts = certItems.length > 0;

  var eduLines = String(t.eduL||UI.en.eduL).split(/\s*\u00b7\s*/).filter(Boolean).map(function(line){
    var m = line.match(/^([^(,]+)([,(][\s\S]*)?$/);
    if (!m) return '<div class="erow"><span class="edeg">'+esc(line)+'</span></div>';
    var deg = esc(m[1].trim()); var det = m[2]?esc(m[2].trim()):'';
    var sep = (det.indexOf(',')===0) ? '' : ' ';
    return '<div class="erow"><span class="edeg">'+deg+'</span>'+(det?sep+'<span class="edet">'+det+'</span>':'')+'</div>';
  }).join('');

  var half = Math.ceil(certItems.length/2);
  var certCol = function(arr){ return '<div class="ccol">'+arr.map(function(c){ return '<span class="ci">'+esc(c)+'</span>'; }).join('')+'</div>'; };
  var certHtml = certItems.length === 1
    ? '<div class="ccol" style="width:98%">'+'<span class="ci">'+esc(certItems[0])+'</span></div>'
    : certCol(certItems.slice(0,half))+certCol(certItems.slice(half));

  var CAT_ORDER = ['kitchen','teaching','community','education','volunteer','performance','seminarschools'];
  var activeCats = CAT_ORDER.filter(function(c){ return active.has(c); });
  var pickL = function (o) { return (o && typeof o === 'object') ? (o[lang] || o.en) : o; };
  var summaryRaw;
  if (activeCats.length === 0) {
    summaryRaw = pickL(SUMMARY);
  } else if (activeCats.length === 1) {
    summaryRaw = pickL(SUMMARY_BY_CAT[activeCats[0]]) || pickL(SUMMARY);
  } else {
    summaryRaw = activeCats.map(function(c){
      var t = String(pickL(SUMMARY_BY_CAT[c]) || '').trim();
      var m = t.match(/^[\s\S]*?(?:[.!?](?=\s|$)|[。！？؟])/);
      return m ? m[0].trim() : t;
    }).filter(Boolean).join(' ');
  }
  var summaryText = esc(summaryRaw).replace(/\n\n/g, '</p><p>');
  if (summaryText.indexOf('</p>') !== -1) summaryText = '<p>' + summaryText + '</p>';
  var compL = COMPETENCIES_L10N[lang] || COMPETENCIES;
  var compIdx;
  if (active.size === 0) { compIdx = COMPETENCIES.map(function (_, i) { return i; }); }
  else {
    var compUnion = {};
    activeCats.forEach(function (c) { (COMP_BY_CAT[c] || []).forEach(function (x) { compUnion[x] = 1; }); });
    compIdx = COMPETENCIES.map(function (c, i) { return compUnion[c] ? i : -1; }).filter(function (i) { return i >= 0; });
  }
  var showComp = compIdx.length > 0;
  var compHtml = compIdx.map(function (i, k) { var mk = '<span class="m"' + (k ? '' : ' style="margin-left:0"') + '>&#9642;</span>'; return '<span style="white-space:nowrap">' + mk + esc(compL[i]) + '</span>'; }).join(' ');

  var css = [
    "#printCv{font-family:Georgia,'Times New Roman','Liberation Serif',serif;color:#1c1c1c;background:#fff;font-size:10.5pt;line-height:1.4;}",
    "#printCv a{color:inherit;text-decoration:none;}",

    "#printCv .hd{width:100%;border-collapse:collapse;}",

    "#printCv .hd td:first-child{width:100%;}",
    "#printCv .hd .name{font-size:23pt;font-weight:600;letter-spacing:0.4pt;color:#1c1c1c;line-height:1.04;}",
    "#printCv .hd .name .post{font-size:11pt;font-weight:600;letter-spacing:1pt;color:#7A2632;margin-left:5pt;}",
    "#printCv .hd .contact{text-align:right;font-size:8.6pt;letter-spacing:0.4pt;color:#5b5b5b;line-height:1.6;}",
    "#printCv .hd .contact .em{color:#7A2632;}",
    "#printCv .rule{border-bottom:1.5px solid #7A2632;margin-top:6pt;height:0;font-size:0;}",
    "#printCv .summary{margin-top:6pt;font-size:9.5pt;line-height:1.38;color:#2b2b2b;text-align:left;}",
    "#printCv .summary p{margin:0 0 4pt 0;}",
    "#printCv .summary p:last-child{margin-bottom:0;}",
    "#printCv .comp{margin-top:4pt;font-size:8.9pt;line-height:1.42;color:#454545;overflow-wrap:break-word;word-wrap:break-word;}",
    "#printCv .comp .m{color:#7A2632;margin:0 5pt;}",
    "#printCv .sec{margin-top:9pt;}",
    "#printCv .sh{font-size:9.5pt;font-weight:600;letter-spacing:2.2pt;text-transform:uppercase;color:#7A2632;border-bottom:0.75px solid #ddc8cc;padding-bottom:2pt;margin-bottom:3.5pt;page-break-after:avoid;}",
    "#printCv .rows{width:100%;border-collapse:collapse;}",

    "#printCv .rows td.d{width:"+dateColPt+"pt;text-align:right;white-space:nowrap;font-size:8.6pt;color:#6c6c6c;padding-right:12pt;padding-top:3.1pt;letter-spacing:0.2pt;}",

    "#printCv .t{font-weight:bold;color:#171717;}",
    "#printCv .n{font-style:italic;color:#5c5c5c;font-size:9.6pt;}",
    "#printCv .edu{margin-top:8pt;}",
    "#printCv .erow{padding:1.7pt 0;font-size:10.1pt;line-height:1.32;}",
    "#printCv .edeg{font-weight:bold;color:#171717;}",
    "#printCv .edet{color:#4f4f4f;}",
    "#printCv .certs{margin-top:9pt;}",
    "#printCv .ccol{display:inline-block;vertical-align:top;width:48%;margin-right:2%;}",

    + "#printCv .ccol .ci::before{content:\"\\2023\\00a0\";color:#7A2632;}"
  ].join('\n');

  host.innerHTML = '<style>'+css+'</style>'
    + '<table class="hd block"><tr><td><span class="name">Saul Karim NMH,<span class="post">MA</span></span></td>'
    + '<td class="contact"><span class="em">saulnassau@protonmail.com</span><br>seminarschools.com/saulnassau<br>416&middot;771&middot;0382 &nbsp;&middot;&nbsp; Toronto</td></tr></table>'
    + '<div class="rule"></div>'

    + (showComp ? '<div class="comp block">'+compHtml+'</div>' : '')
    + (showPrintEdu ? '<div class="sec edu block"><div class="sh">'+esc(t.edu||UI.en.edu)+'</div>'+eduLines+'</div>' : '')
    + secs
    + (showPrintCerts ? '<div class="sec certs block"><div class="sh">'+esc(t.certs||UI.en.certs)+'</div>'+certHtml+'</div>' : '');
  fitPrintCvToTwoPages(host);
}
// Fit the print document into two pages maximum. Measures once at scale 1,
// then binary-searches the largest zoom whose greedy section-packing fits the
// two-page budget. Scaled-height arithmetic overestimates (smaller text wraps
// less), so the two-page guarantee is conservative. Layout-less environments
// measure zero and fall through to zoom 1.
function fitPrintCvToTwoPages(host) {
  // Whole-page rule: output is exactly one page, or two pages with the
  // second page meaningfully filled. Never a stub page carrying one
  // orphaned section. Mechanism: greedy section packing at candidate zoom
  // levels; shrink (down to 0.84) to pull a slightly-overflowing document
  // onto one page; expand (up to 1.14) to let a sparse two-page document
  // fill its second page; shrink to fit two when content exceeds two.
  host.style.zoom = '1';
  var probe = document.createElement('div');
  probe.style.cssText = 'position:absolute;left:-9999px;top:0;height:253.4mm;width:10px;';
  document.body.appendChild(probe);
  var pageH = probe.offsetHeight;
  document.body.removeChild(probe);
  if (!pageH) return;
  var prev = host.getAttribute('style') || '';
  host.style.position = 'absolute'; host.style.left = '-99999px'; host.style.top = '0';
  host.style.display = 'block'; host.style.visibility = 'hidden'; host.style.width = '187.9mm';
  void host.offsetHeight;
  var blocks = host.querySelectorAll('.block');
  var sizes = [];
  for (var k = 0; k < blocks.length; k++) {
    var h = blocks[k].offsetHeight;
    var mt = parseFloat((window.getComputedStyle(blocks[k]).marginTop) || '0') || 0;
    if (h > 0) sizes.push(h + mt);
  }
  host.setAttribute('style', prev);
  if (!sizes.length) { host.style.zoom = '1'; return; }
  // Greedy packer: returns pages used and the filled fraction of the last page.
  var pack = function (z) {
    var pages = 1, cur = 0;
    for (var k2 = 0; k2 < sizes.length; k2++) {
      var need = sizes[k2] * z;
      if (cur > 0 && cur + need > pageH) { pages++; cur = need; } else { cur += need; }
    }
    return { pages: pages, lastFill: cur / pageH };
  };
  var z = 1;
  var p1 = pack(1);
  if (p1.pages === 1) {
    z = 1; // one whole page already
  } else if (p1.pages === 2) {
    if (p1.lastFill < 0.5) {
      // Stub second page. First choice: shrink onto one page.
      var fit1 = 0;
      for (var zz = 0.99; zz >= 0.84; zz -= 0.01) {
        if (pack(zz).pages === 1) { fit1 = zz; break; }
      }
      if (fit1) { z = fit1; }
      else { z = 1; }
    }
    // lastFill >= 0.5: an honest second page; leave at 1.
  } else {
    // More than two pages: shrink to the largest zoom that fits two.
    var lo = 0.5, hi = 1;
    for (var it = 0; it < 10; it++) {
      var mid = (lo + hi) / 2;
      if (pack(mid).pages <= 2) { lo = mid; } else { hi = mid; }
    }
    z = Math.floor(lo * 100) / 100;
    if (pack(z).pages > 2) z = Math.max(0.5, z - 0.02);
  }
  host.style.zoom = String(z);
}
