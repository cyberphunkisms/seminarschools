# Netlify build configuration
# seminarschools.com static site

[build]
  command = "node scripts/build-search-pages.js && node scripts/build-writing-shortcuts.js && node scripts/build-public-deploy.js"
  publish = "public"
  # Credit conservation (June 6 2026): skip the build entirely when a push
  # touches only non-public plumbing (scraper code, workflows, scrape logs,
  # history snapshots). Exit 0 = skip, exit 1 = build, mirroring git diff
  # --quiet semantics. Robot pushes still build because they change
  # seminars/ and festivals/ alongside the logs.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)scripts/' ':(exclude).github/' ':(exclude)data/history/' ':(exclude)data/scrape-log.json'"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Form processing: Netlify auto-detects forms with data-netlify="true"
# in published HTML. Active public forms include:
#   "bookwormcard" — matrix-chat at /bb/
#   "leizu-intake" — Leizu inquiry and paid-plan intake at /leizu/intake/
#
# After first deploy, configure in Netlify dashboard:
#
# 1. Site Configuration → Forms → confirm both active forms are detected
# 2. Site Configuration → Notifications → Form submission notifications
#    → add an admin email notification for each form you want monitored
# 3. (Optional, autoresponder to submitter) connect Zapier:
#    Trigger: Netlify Forms → "New Form Submission" → form: bookwormcard
#    Action: Gmail/your-email-provider → "Send Email"
#      To: {email field}
#      Subject: Your wormcard
#      Body: {card-text field}
#    Free tier: 100 tasks/month; scales via Zapier paid plans.
#    Alternative: Netlify Function with Resend/SendGrid/Mailgun.


