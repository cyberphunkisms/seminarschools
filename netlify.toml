# Netlify build configuration
# seminarschools.com static site

[build]
  publish = "."
  # Credit conservation (June 6 2026): skip the build entirely when a push
  # touches only non-public plumbing (scraper code, workflows, scrape logs,
  # history snapshots). Exit 0 = skip, exit 1 = build, mirroring git diff
  # --quiet semantics. Robot pushes still build because they change
  # seminars/ and festivals/ alongside the logs.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)scripts/' ':(exclude).github/' ':(exclude)data/history/' ':(exclude)data/scrape-log.json'"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Form processing: Netlify auto-detects forms with data-netlify="true"
# in published HTML. Active public forms include:
#   "bookwormcard" — matrix-chat at /bb/
#   "leizu-intake" — Leizu inquiry and paid-plan intake at /leizu/intake/
#
# After first deploy, configure in Netlify dashboard:
#
# 1. Site Configuration → Forms → confirm both active forms are detected
# 2. Site Configuration → Notifications → Form submission notifications
#    → add an admin email notification for each form you want monitored
# 3. (Optional, autoresponder to submitter) connect Zapier:
#    Trigger: Netlify Forms → "New Form Submission" → form: bookwormcard
#    Action: Gmail/your-email-provider → "Send Email"
#      To: {email field}
#      Subject: Your wormcard
#      Body: {card-text field}
#    Free tier: 100 tasks/month; scales via Zapier paid plans.
#    Alternative: Netlify Function with Resend/SendGrid/Mailgun.

# Redirect /bb/create/ to /bb/ (matrix chat is the canonical entry now).
[[redirects]]
  from = "/bb/create/"
  to = "/bb/"
  status = 301

[[redirects]]
  from = "/bb/create"
  to = "/bb/"
  status = 301

# Pretty URL for the Gemini chat function
[[redirects]]
  from = "/api/gemini-chat"
  to = "/.netlify/functions/gemini-chat"
  status = 200

# Optional: pretty URLs already handled by Netlify default
# [[redirects]]
#   from = "/bb"
#   to = "/bb/"
#   status = 301

# === Path 2 architecture: block tooling paths from public serving ===
# Netlify deploys the entire repo. Scraper code, internal audit files, and
# workflow definitions ship to the deploy because GitHub Actions needs them,
# but they must not be reachable via the public domain. PM35 substrate vs
# plumbing at the URL layer.
[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.github/*"
  to = "/404.html"
  status = 404
  force = true

# Headers: standard security baseline
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), payment=(), usb=()"

# === Credit conservation (June 7 2026): static-asset cache headers ===
# Cut repeat-visitor bandwidth by letting browsers hold immutable-ish assets
# instead of re-pulling them from Netlify. CSS and JS are deliberately left on
# Netlify's default etag revalidation so a deploy never serves a stale
# stylesheet. Images and fonts rarely change, so they carry a long max-age with
# stale-while-revalidate as the safety valve.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
[[headers]]
  for = "/*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# === Leizu paid-booking pipeline ===
# The public pages call stable /api routes. Function credentials and calendar
# URLs remain in Netlify environment variables, never in browser JavaScript.
[[redirects]]
  from = "/api/leizu-verify-payment"
  to = "/.netlify/functions/leizu-verify-payment"
  status = 200

[[redirects]]
  from = "/api/cal-booking-webhook"
  to = "/.netlify/functions/cal-booking-webhook"
  status = 200

[[redirects]]
  from = "/api/stripe-payment-webhook"
  to = "/.netlify/functions/stripe-payment-webhook"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
