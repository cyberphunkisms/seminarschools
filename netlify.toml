# Headers: standard security baseline
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), payment=(), usb=()"

# === Credit conservation (June 7 2026): static-asset cache headers ===
# Cut repeat-visitor bandwidth by letting browsers hold immutable-ish assets
# instead of re-pulling them from Netlify. CSS and JS are deliberately left on
# Netlify's default etag revalidation so a deploy never serves a stale
# stylesheet. Images and fonts rarely change, so they carry a long max-age with
# stale-while-revalidate as the safety valve.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
[[headers]]
  for = "/*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# === Leizu paid-booking pipeline ===
# The public pages call stable /api routes. Function credentials and calendar
# URLs remain in Netlify environment variables, never in browser JavaScript.
[[redirects]]
  from = "/api/leizu-verify-payment"
  to = "/.netlify/functions/leizu-verify-payment"
  status = 200

[[redirects]]
  from = "/api/cal-booking-webhook"
  to = "/.netlify/functions/cal-booking-webhook"
  status = 200

[[redirects]]
  from = "/api/stripe-payment-webhook"
  to = "/.netlify/functions/stripe-payment-webhook"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

# Intake and payment-success pages can contain personal context or a Stripe session ID.
# Browser and intermediary caches must not retain either page.
