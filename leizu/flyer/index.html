<style>
:root{
  --g05:#E5E5E5;--g08:#D3D3D3;--g10:#C7C7C7;--g12:#BBBBBB;
  --g14:#AFAFAF;--g16:#A3A3A3;--g18:#979797;--g20:#8B8B8B;
  --g22:#7F7F7F;--g24:#737373;--g26:#676767;--g28:#5B5B5B;
  --g30:#4F4F4F;--g32:#434343;--g34:#373737;--g36:#2B2B2B;
  --g38:#1F1F1F;--g40:#131313;--g42:#0D0D0D;--g44:#080808;
  --g46:#050505;--g48:#030303;--g50:#000000;
  --d:'Cormorant Garamond','Noto Serif TC',Georgia,serif;
  --h:'Noto Serif TC','Cormorant Garamond',serif;
  --m:'JetBrains Mono','Courier New',monospace;
  color-scheme:only light;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--g10);color-scheme:only light;}
body{-webkit-font-smoothing:antialiased;padding:32px 20px;}

.page{
  width:8.5in;height:11in;margin:0 auto;
  background:#fff !important;
  position:relative;overflow:hidden;
  box-shadow:0 12px 80px rgba(0,0,0,0.4);
}
@media print{
  html,body{background:white !important;padding:0;}
  .page{box-shadow:none;margin:0;}
  @page{size:letter;margin:0;}
  .np{display:none;}
}
.np{position:fixed;top:14px;right:14px;z-index:99;
  background:var(--g50);color:#fff;padding:9px 18px;
  border:none;cursor:pointer;font-family:var(--m);
  font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}

/* MANDALA, fills the whole page, centered, full presence */
.mandala{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-44%,-48%);
  width:130%;height:130%;
  z-index:0;pointer-events:none;
  color:var(--g24);
  opacity:0.72;
}
.mandala svg{display:block;width:100%;height:100%;}
.mandala .stroke{stroke:currentColor;}

/* TOP STRIP, school name, left, small */
.topstrip{
  position:absolute;top:0;left:0;right:0;
  z-index:3;
  padding:0.45in 0.55in;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.brand{display:flex;flex-direction:column;gap:5px;}
.brand-han{
  font-family:var(--h);font-size:15px;font-weight:600;
  letter-spacing:0.26em;color:var(--g30);line-height:1;
}
.brand-en{
  font-family:var(--d);font-size:40px;font-weight:600;
  letter-spacing:0.02em;line-height:1;
  color:var(--g50);text-transform:uppercase;
}
.brand-en em{font-weight:300;font-style:normal;color:var(--g36);}
.topright{
  font-family:var(--m);font-size:10.5px;
  letter-spacing:0.22em;text-transform:uppercase;
  color:var(--g28);text-align:right;line-height:1.9;
}

/* BOTTOM STRIP, url + qr, left-right */
.botstrip{
  position:absolute;bottom:0;left:0;right:0;
  z-index:3;
  padding:0.38in 0.55in 0.42in;
  display:flex;justify-content:space-between;align-items:flex-end;
}
.url{
  font-family:var(--m);font-size:18px;
  letter-spacing:0.07em;color:var(--g38);
  text-transform:lowercase;line-height:1;
}
.url .sl{color:var(--g50);font-weight:600;}
.qr{width:148px;height:148px;flex-shrink:0;}
.qr img{display:block;width:100%;height:100%;}

/* HORIZONTAL RULES, one at top, one at bottom, full width */
.rule-t{
  position:absolute;top:1.22in;left:0;right:0;
  height:1.5px;background:var(--g50);z-index:3;
}
.rule-b{
  position:absolute;bottom:1.18in;left:0;right:0;
  height:1.5px;background:var(--g50);z-index:3;
}
</style>
